<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>わんわんゲーム 👀</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html {
            width: 100%; height: 100%;
            overflow: hidden;
            background: #FFFDE7;
            font-family: Arial, sans-serif;
            user-select: none;
        }

        /* ===== カード ===== */
        #game {
            width: 100vw; height: 100vh;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }
        .card {
            width: 28%; height: 62%;
            background: white;
            border: 8px solid #ddd;
            border-radius: 28px;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            position: relative; overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
            transition: border-color 0.15s, transform 0.15s, background 0.15s;
        }
        .card.gazing {
            border-color: #FF5252;
            transform: scale(1.07);
            background: #FFF3F3;
        }
        .card .emoji { font-size: clamp(52px, 12vw, 88px); line-height: 1; }
        .card .name  {
            margin-top: 12px;
            font-size: clamp(15px, 4vw, 24px);
            font-weight: bold; color: #555;
        }
        .dwell {
            position: absolute; bottom: 0; left: 0;
            height: 14px; width: 0%;
            background: linear-gradient(90deg, #4CAF50, #8BC34A);
            border-radius: 0 0 20px 20px;
            transition: width 0.06s linear;
        }
        @keyframes woof {
            0%,100% { transform: scale(1.07); }
            40%     { transform: scale(1.18) rotate(5deg); }
            70%     { transform: scale(1.15) rotate(-4deg); }
        }
        .card.woofing {
            animation: woof 0.28s ease-in-out infinite;
            border-color: #FF5252;
        }

        /* ===== カメラ ===== */
        #cam-wrap {
            position: fixed; bottom: 12px; right: 12px;
            width: 120px; height: 90px;
            border: 3px solid #333; border-radius: 10px;
            overflow: hidden; background: #000; z-index: 200;
        }
        #video {
            width: 100%; height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            display: block;
        }

        /* ===== 視線カーソル ===== */
        #cursor {
            position: fixed;
            width: 40px; height: 40px;
            border-radius: 50%;
            background: rgba(255, 82, 82, 0.35);
            border: 3px solid rgba(255, 82, 82, 0.85);
            pointer-events: none;
            z-index: 300;
            transform: translate(-50%, -50%);
            display: none;
            transition: left 0.05s ease, top 0.05s ease;
        }

        /* ===== ステータス ===== */
        #status {
            position: fixed; top: 14px; left: 0; width: 100%;
            text-align: center;
            font-size: clamp(15px, 3.5vw, 22px);
            font-weight: bold; color: #444; z-index: 100;
        }

        /* ===== オーバーレイ ===== */
        .overlay {
            position: fixed; inset: 0;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            gap: 20px; z-index: 500;
            font-size: 20px; font-weight: bold; color: #444;
            padding: 32px; text-align: center;
        }
        #ov-loading { background: #FFFDE7; }
        #ov-calib   { background: rgba(255,253,231,0.97); display: none; }
        #ov-error   { background: #fff3f3; display: none; color: #c00; }

        .spinner {
            width: 52px; height: 52px;
            border: 7px solid #ddd; border-top-color: #FF5252;
            border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .sub { font-size: 14px; color: #777; font-weight: normal; line-height: 1.7; }

        /* キャリブレーション */
        #calib-area {
            position: fixed; inset: 0;
            display: none; z-index: 400;
            background: rgba(255,253,231,0.97);
        }
        .cdot {
            position: absolute;
            width: 50px; height: 50px;
            background: #FF5252; border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 0 0 rgba(255,82,82,0.5);
            animation: pulse 1s infinite;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px;
        }
        @keyframes pulse {
            0%   { box-shadow: 0 0 0 0 rgba(255,82,82,0.5); }
            70%  { box-shadow: 0 0 0 18px rgba(255,82,82,0); }
            100% { box-shadow: 0 0 0 0 rgba(255,82,82,0); }
        }
        .cdot.done { background: #4CAF50; animation: none; }
        #calib-label {
            position: absolute; bottom: 70px; left: 0; width: 100%;
            text-align: center; font-size: 18px; font-weight: bold; color: #444;
        }
        #calib-count {
            position: absolute; bottom: 38px; left: 0; width: 100%;
            text-align: center; font-size: 14px; color: #888;
        }

        #err-btn {
            padding: 14px 32px; font-size: 18px;
            background: #FF5252; color: white;
            border: none; border-radius: 14px; cursor: pointer;
        }
        #load-detail { font-size: 13px; color: #aaa; font-weight: normal; }
    </style>
</head>
<body>

<!-- ローディング -->
<div class="overlay" id="ov-loading">
    <div class="spinner"></div>
    <div id="load-msg">モデルを読み込み中...</div>
    <div id="load-detail">しばらくお待ちください（初回は10〜20秒かかります）</div>
</div>

<!-- エラー -->
<div class="overlay" id="ov-error">
    <div style="font-size:52px">⚠️</div>
    <div id="err-title">エラーが発生しました</div>
    <div class="sub" id="err-msg"></div>
    <button id="err-btn" onclick="location.reload()">もう一度試す</button>
</div>

<!-- キャリブレーション -->
<div id="calib-area">
    <div id="calib-label">👁️ 赤い点を順番に見てください</div>
    <div id="calib-count"></div>
</div>

<!-- 視線カーソル -->
<div id="cursor"></div>

<!-- ステータス -->
<div id="status">読み込み中...</div>

<!-- ゲーム -->
<div id="game">
    <div class="card" id="c0">
        <div class="emoji">🐶</div>
        <div class="name">ポチ</div>
        <div class="dwell" id="d0"></div>
    </div>
    <div class="card" id="c1">
        <div class="emoji">🐕</div>
        <div class="name">コロ</div>
        <div class="dwell" id="d1"></div>
    </div>
    <div class="card" id="c2">
        <div class="emoji">🦮</div>
        <div class="name">タロ</div>
        <div class="dwell" id="d2"></div>
    </div>
</div>

<!-- カメラ -->
<div id="cam-wrap"><video id="video" autoplay playsinline muted></video></div>

<!-- TensorFlow.js + MediaPipe FaceMesh（jsDelivr） -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core@3.9.0/dist/tf-core.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter@3.9.0/dist/tf-converter.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl@3.9.0/dist/tf-backend-webgl.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/face-landmarks-detection@1.0.1/dist/face-landmarks-detection.min.js"></script>

<script>
"use strict";

// ============================================================
//  パラメーター
// ============================================================
const DWELL_MS    = 1800;  // 視線滞留→確定までの時間(ms)
const COOLDOWN_MS = 2500;  // 確定後クールダウン(ms)
const SMOOTH_K    = 0.15;  // 視線スムージング（小さい=滑らか）
const MARGIN_PX   = 24;    // カード判定の余白(px)

// MediaPipe FaceMeshの目のランドマークインデックス
// 左目の瞳（カメラ座標系）= インデックス 468
// 右目の瞳（カメラ座標系）= インデックス 473
const LEFT_IRIS  = 468;
const RIGHT_IRIS = 473;

// ============================================================
//  状態
// ============================================================
const video   = document.getElementById("video");
const cursor  = document.getElementById("cursor");
let detector  = null;
let gameReady = false;

// キャリブレーション用
// 画面座標とカメラ上の目座標をマッピングするための回帰データ
let calibData  = [];   // [{eyeX, eyeY, screenX, screenY}, ...]
let calibDone  = false;

// 視線推定（線形回帰の係数）
let regX = null; // {a, b, c} → screenX = a*eyeX + b*eyeY + c
let regY = null;

// スムージング後の推定視線座標
let gazeX = window.innerWidth  / 2;
let gazeY = window.innerHeight / 2;

// ゲーム状態
let curSel    = -1;
let selStart  = 0;
let lastDecide= 0;

// ============================================================
//  音（Web Audio）
// ============================================================
const ac = new (window.AudioContext || window.webkitAudioContext)();
function bark() {
    if (ac.state === "suspended") ac.resume();
    [[0, 380, 165], [0.22, 320, 135]].forEach(([t, f0, f1]) => {
        const o = ac.createOscillator(), g = ac.createGain();
        o.connect(g); g.connect(ac.destination);
        o.frequency.setValueAtTime(f0, ac.currentTime + t);
        o.frequency.exponentialRampToValueAtTime(f1, ac.currentTime + t + 0.13);
        g.gain.setValueAtTime(0.48, ac.currentTime + t);
        g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + t + 0.15);
        o.start(ac.currentTime + t);
        o.stop(ac.currentTime + t + 0.16);
    });
}

// ============================================================
//  線形回帰（最小二乗法）
//  目の座標(eyeX, eyeY) → 画面座標(screenX or screenY)
// ============================================================
function fitLinear(data, targetKey) {
    // screenCoord = a * eyeX + b * eyeY + c
    const n = data.length;
    if (n < 4) return null;

    // 行列計算（3変数線形回帰）
    let sx=0, sy=0, sz=0, sx2=0, sy2=0, sxy=0, sxz=0, syz=0;
    data.forEach(d => {
        const x = d.eyeX, y = d.eyeY, z = d[targetKey];
        sx+=x; sy+=y; sz+=z; sx2+=x*x; sy2+=y*y;
        sxy+=x*y; sxz+=x*z; syz+=y*z;
    });
    // 正規方程式を解く（ガウス消去法簡略版）
    // [sx2  sxy  sx ] [a]   [sxz]
    // [sxy  sy2  sy ] [b] = [syz]
    // [sx   sy   n  ] [c]   [sz ]
    const A = [
        [sx2, sxy, sx,  sxz],
        [sxy, sy2, sy,  syz],
        [sx,  sy,  n,   sz ],
    ];
    // ガウス消去
    for (let col = 0; col < 3; col++) {
        let maxRow = col;
        for (let row = col+1; row < 3; row++)
            if (Math.abs(A[row][col]) > Math.abs(A[maxRow][col])) maxRow = row;
        [A[col], A[maxRow]] = [A[maxRow], A[col]];
        if (Math.abs(A[col][col]) < 1e-10) return null;
        for (let row = col+1; row < 3; row++) {
            const f = A[row][col] / A[col][col];
            for (let k = col; k < 4; k++) A[row][k] -= f * A[col][k];
        }
    }
    const c = A[2][3] / A[2][2];
    const b = (A[1][3] - A[1][2]*c) / A[1][1];
    const a = (A[0][3] - A[0][2]*c - A[0][1]*b) / A[0][0];
    return { a, b, c };
}

function predictGaze(eyeX, eyeY) {
    if (!regX || !regY) return null;
    return {
        x: regX.a * eyeX + regX.b * eyeY + regX.c,
        y: regY.a * eyeX + regY.b * eyeY + regY.c,
    };
}

// ============================================================
//  キャリブレーション
// ============================================================
// 9点（画面の四隅・辺中央・中心）
const CALIB_PTS = [
    [15, 15], [50, 15], [85, 15],
    [15, 50], [50, 50], [85, 50],
    [15, 85], [50, 85], [85, 85],
];
let calibIdx = 0;
let calibCollecting = false;
let calibBuf = [];  // 現在の点で集めた目座標サンプル
const SAMPLES_PER_PT = 20; // 1点あたりのサンプル数

function showCalibDot(idx) {
    const area = document.getElementById("calib-area");
    area.querySelectorAll(".cdot").forEach(d => d.remove());

    if (idx >= CALIB_PTS.length) {
        // キャリブ完了 → 回帰計算
        regX = fitLinear(calibData, "screenX");
        regY = fitLinear(calibData, "screenY");
        if (!regX || !regY) {
            // データ不足 → やり直し
            calibData = []; calibIdx = 0; calibBuf = [];
            showCalibDot(0);
            return;
        }
        calibDone = true;
        area.style.display = "none";
        startGame();
        return;
    }

    const [px, py] = CALIB_PTS[idx];
    const screenX = window.innerWidth  * px / 100;
    const screenY = window.innerHeight * py / 100;

    const dot = document.createElement("div");
    dot.className = "cdot";
    dot.style.left = `${px}%`;
    dot.style.top  = `${py}%`;
    dot.textContent = "👁️";
    area.appendChild(dot);

    document.getElementById("calib-count").textContent =
        `${idx + 1} / ${CALIB_PTS.length}`;

    calibBuf = [];
    calibCollecting = true;

    // タップでも進める
    const onTap = () => {
        if (calibBuf.length >= 5) finishDot(dot, screenX, screenY);
    };
    dot.addEventListener("click",      onTap, { once: true });
    dot.addEventListener("touchstart", onTap, { once: true, passive: true });

    // SAMPLES_PER_PT サンプル集まったら自動で次へ
    // （detectLoopがcalibBufに追加していく）
}

function finishDot(dot, screenX, screenY) {
    calibCollecting = false;
    dot.classList.add("done");

    // サンプルの平均を使う
    const meanEyeX = calibBuf.reduce((s,d)=>s+d.x, 0) / calibBuf.length;
    const meanEyeY = calibBuf.reduce((s,d)=>s+d.y, 0) / calibBuf.length;
    calibData.push({ eyeX: meanEyeX, eyeY: meanEyeY, screenX, screenY });

    setTimeout(() => {
        calibIdx++;
        showCalibDot(calibIdx);
    }, 350);
}

// ============================================================
//  カード当たり判定
// ============================================================
function hitCard(x, y) {
    for (let i = 0; i < 3; i++) {
        const r = document.getElementById(`c${i}`).getBoundingClientRect();
        if (x >= r.left - MARGIN_PX && x <= r.right  + MARGIN_PX &&
            y >= r.top  - MARGIN_PX && y <= r.bottom + MARGIN_PX) return i;
    }
    return -1;
}

// ============================================================
//  ゲームループ
// ============================================================
function onGaze(x, y) {
    // スムージング
    gazeX += (x - gazeX) * SMOOTH_K;
    gazeY += (y - gazeY) * SMOOTH_K;

    // カーソル
    cursor.style.left = `${gazeX}px`;
    cursor.style.top  = `${gazeY}px`;

    const sel = hitCard(gazeX, gazeY);
    if (sel !== curSel) {
        if (curSel !== -1) {
            document.getElementById(`c${curSel}`).classList.remove("gazing");
            document.getElementById(`d${curSel}`).style.width = "0%";
        }
        curSel   = sel;
        selStart = performance.now();
        if (curSel !== -1)
            document.getElementById(`c${curSel}`).classList.add("gazing");
    }
    if (curSel !== -1) {
        const prog = Math.min((performance.now() - selStart) / DWELL_MS * 100, 100);
        document.getElementById(`d${curSel}`).style.width = `${prog}%`;
        if (prog >= 100) decide(curSel);
    }
}

function decide(idx) {
    const now = performance.now();
    if (now - lastDecide < COOLDOWN_MS) return;
    lastDecide = now;
    const card = document.getElementById(`c${idx}`);
    if (card.classList.contains("woofing")) return;
    document.getElementById(`d${idx}`).style.width = "0%";
    selStart = now + COOLDOWN_MS;
    card.classList.add("woofing");
    bark();
    document.getElementById("status").textContent = "わんわん！🐾";
    setTimeout(() => {
        card.classList.remove("woofing");
        document.getElementById("status").textContent = "どのこをみてる？👀";
    }, 2000);
}

function startGame() {
    cursor.style.display = "block";
    gameReady = true;
    document.getElementById("status").textContent = "どのこをみてる？👀";
}

// ============================================================
//  検出ループ（FaceMesh）
// ============================================================
async function detectLoop() {
    if (video.readyState < 2) { requestAnimationFrame(detectLoop); return; }

    try {
        const faces = await detector.estimateFaces(video, { flipHorizontal: true });

        if (faces.length > 0) {
            const kps = faces[0].keypoints;

            // 虹彩（瞳）の座標を取得
            // flipHorizontal:true なのでミラー補正済み
            const lIris = kps[LEFT_IRIS];
            const rIris = kps[RIGHT_IRIS];

            if (lIris && rIris) {
                // 両目の中間点（カメラ画像上の正規化座標）
                const eyeX = ((lIris.x + rIris.x) / 2) / video.videoWidth;
                const eyeY = ((lIris.y + rIris.y) / 2) / video.videoHeight;

                if (calibCollecting) {
                    // キャリブレーション中：サンプル収集
                    calibBuf.push({ x: eyeX, y: eyeY });
                    if (calibBuf.length >= SAMPLES_PER_PT) {
                        const dot = document.querySelector(".cdot:not(.done)");
                        const [px, py] = CALIB_PTS[calibIdx];
                        finishDot(dot,
                            window.innerWidth  * px / 100,
                            window.innerHeight * py / 100);
                    }
                } else if (calibDone && gameReady) {
                    // ゲーム中：視線推定
                    const pred = predictGaze(eyeX, eyeY);
                    if (pred) onGaze(pred.x, pred.y);
                }
            }
        }
    } catch(e) { /* フレームスキップ */ }

    requestAnimationFrame(detectLoop);
}

// ============================================================
//  初期化
// ============================================================
async function init() {
    try {
        // カメラ起動
        document.getElementById("load-msg").textContent = "カメラを起動中...";
        const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "user", width: { ideal: 640 }, height: { ideal: 480 } }
        });
        video.srcObject = stream;
        await new Promise(r => { video.onloadeddata = r; });

        // TensorFlow.js バックエンド初期化
        document.getElementById("load-msg").textContent = "AIモデルを準備中...";
        await tf.setBackend("webgl");
        await tf.ready();

        // FaceMesh（虹彩追跡あり）ロード
        detector = await faceLandmarksDetection.createDetector(
            faceLandmarksDetection.SupportedModels.MediaPipeFaceMesh,
            {
                runtime: "tfjs",
                refineLandmarks: true,  // 虹彩ランドマーク(468,473)を有効化
                maxFaces: 1,
            }
        );

        // ウォームアップ（最初のフレームは遅いため）
        document.getElementById("load-msg").textContent = "初期化中...";
        await detector.estimateFaces(video, { flipHorizontal: true });

        // キャリブレーション開始
        document.getElementById("ov-loading").style.display = "none";
        document.getElementById("calib-area").style.display = "block";
        showCalibDot(0);
        detectLoop();

    } catch(e) {
        console.error(e);
        document.getElementById("ov-loading").style.display = "none";
        document.getElementById("err-title").textContent =
            e.name === "NotAllowedError" ? "カメラの許可が必要です" : "読み込みに失敗しました";
        document.getElementById("err-msg").textContent =
            (e.message || String(e)) + "\n\nネット接続を確認して「もう一度試す」を押してください。";
        document.getElementById("ov-error").style.display = "flex";
    }
}

window.addEventListener("load", init);
</script>
</body>
</html>
