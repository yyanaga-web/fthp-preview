<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>虹彩検出テスト</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #111; color: #fff; font-family: Arial, sans-serif; }
        #wrap {
            position: relative;
            width: 100vw; height: 56vw; max-height: 50vh;
            background: #000;
        }
        video, canvas {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
        }
        video { transform: scaleX(-1); }
        #log {
            padding: 12px;
            font-size: 13px;
            line-height: 1.8;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .ok  { color: #4CAF50; }
        .err { color: #FF5252; }
        .inf { color: #90CAF9; }
        #spinner {
            display: inline-block;
            width: 16px; height: 16px;
            border: 3px solid #555; border-top-color: #fff;
            border-radius: 50%; animation: spin 0.7s linear infinite;
            vertical-align: middle; margin-right: 6px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div id="wrap">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
</div>
<div id="log"><span id="spinner"></span> 初期化中...</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core@4.13.0/dist/tf-core.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter@4.13.0/dist/tf-converter.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl@4.13.0/dist/tf-backend-webgl.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/face-detection@1.0.2/dist/face-detection.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/face-landmarks-detection@1.0.5/dist/face-landmarks-detection.min.js"></script>

<script>
const video  = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx    = canvas.getContext("2d");
const logEl  = document.getElementById("log");

let frameCount = 0;

function log(msg, cls="") {
    const now = new Date().toLocaleTimeString("ja-JP");
    logEl.innerHTML = `[${now}] <span class="${cls}">${msg}</span>\n` + logEl.innerHTML;
    // spinnerは最初だけ
    document.getElementById("spinner")?.remove();
}

async function main() {
    try {
        log("カメラ起動中...", "inf");
        const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "user", width: { ideal: 640 }, height: { ideal: 480 } }
        });
        video.srcObject = stream;
        await new Promise(r => video.onloadeddata = r);
        log(`カメラOK: ${video.videoWidth}x${video.videoHeight}`, "ok");

        log("TF.js バックエンド初期化中...", "inf");
        await tf.setBackend("webgl");
        await tf.ready();
        log(`バックエンド: ${tf.getBackend()}`, "ok");

        log("FaceMeshモデル読み込み中...", "inf");
        const detector = await faceLandmarksDetection.createDetector(
            faceLandmarksDetection.SupportedModels.MediaPipeFaceMesh,
            {
                runtime: "mediapipe",
                solutionPath: "https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4.1633559619",
                refineLandmarks: true,
                maxFaces: 1,
            }
        );
        log("モデル読み込み完了！", "ok");

        canvas.width  = video.videoWidth;
        canvas.height = video.videoHeight;
        // canvasの表示サイズはCSSで制御（videoと同じ）
        canvas.style.transform = "scaleX(-1)"; // ミラー表示（videoと合わせる）

        log(`canvas: ${canvas.width}x${canvas.height}`, "inf");
        log("検出ループ開始（flipHorizontal:false で試します）...", "inf");

        async function detect() {
            if (video.readyState < 2) { requestAnimationFrame(detect); return; }
            try {
                // flipHorizontal:false で試す（縦向きカメラ対策）
                const faces = await detector.estimateFaces(video, { flipHorizontal: false });
                frameCount++;

                ctx.clearRect(0, 0, canvas.width, canvas.height);

                if (faces.length === 0) {
                    if (frameCount % 6 === 0) log(`[${frameCount}] 顔未検出`, "err");
                } else {
                    const kps = faces[0].keypoints;
                    // 全ランドマーク描画
                    ctx.fillStyle = "rgba(0,255,0,0.7)";
                    kps.forEach(p => {
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, 2, 0, Math.PI*2);
                        ctx.fill();
                    });
                    // 虹彩
                    const L = kps[468], R = kps[473];
                    if (L && R && L.x > 0) {
                        [L, R].forEach(p => {
                            ctx.fillStyle = "red";
                            ctx.beginPath();
                            ctx.arc(p.x, p.y, 8, 0, Math.PI*2);
                            ctx.fill();
                        });
                        log(`✅ 虹彩OK! L:(${L.x.toFixed(0)},${L.y.toFixed(0)}) R:(${R.x.toFixed(0)},${R.y.toFixed(0)})`, "ok");
                    } else {
                        log(`顔検出OK(${kps.length}点) ⚠️ 虹彩(468,473)なし`, "err");
                    }
                }
            } catch(e) {
                log(`検出エラー: ${e.message}`, "err");
            }
            setTimeout(() => requestAnimationFrame(detect), 800);
        }

        detect();

    } catch(e) {
        log(`エラー: ${e.name}: ${e.message}`, "err");
    }
}

window.addEventListener("load", main);
</script>
</body>
</html>
