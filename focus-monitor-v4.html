<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>集中モニター ⭐</title>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #FFF8F0;
  --card: #FFFFFF;
  --text: #2D2D2D;
  --muted: #9A9A9A;
  --good: #4CAF82;
  --warn: #F5A623;
  --bad: #E85D5D;
  --accent: #5B8DEF;
  --border: #F0EBE3;
  --shadow: rgba(0,0,0,0.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'M PLUS Rounded 1c', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background-image: radial-gradient(circle, #E8D5C4 1.5px, transparent 1.5px);
  background-size: 28px 28px;
  opacity: 0.5;
  pointer-events: none;
}
.app {
  position: relative; z-index: 1;
  max-width: 480px;
  margin: 0 auto;
  padding: 20px 16px 60px;
}
.header { text-align: center; margin-bottom: 20px; }
.header-inner {
  display: inline-flex; align-items: center; gap: 10px;
  background: white; border-radius: 50px; padding: 10px 22px;
  box-shadow: 0 4px 20px var(--shadow); border: 2px solid var(--border);
}
.h-icon { font-size: 1.6rem; animation: spin-slow 8s linear infinite; }
@keyframes spin-slow { to { transform: rotate(360deg); } }
.h-title { font-size: 1.1rem; font-weight: 900; }
.h-title em { color: var(--accent); font-style: normal; }

.score-card {
  background: white; border-radius: 28px; padding: 24px 20px 20px;
  box-shadow: 0 8px 32px var(--shadow); border: 2px solid var(--border);
  margin-bottom: 14px; text-align: center; transition: border-color 0.4s;
}
.score-card.ok   { border-color: var(--good); }
.score-card.warn { border-color: var(--warn); }
.score-card.bad  { border-color: var(--bad); }
.score-face { font-size: 4rem; line-height: 1; margin-bottom: 6px; display: block; }
.score-label { font-size: 1.15rem; font-weight: 900; margin-bottom: 4px; min-height: 1.4em; }
.score-sub { font-size: 0.8rem; color: var(--muted); margin-bottom: 14px; min-height: 1.2em; }
.gauge-wrap { background: var(--border); border-radius: 20px; height: 18px; overflow: hidden; }
.gauge-fill {
  height: 100%; border-radius: 20px;
  transition: width 0.6s cubic-bezier(.34,1.56,.64,1), background 0.4s;
  background: var(--good);
}
.gauge-labels {
  display: flex; justify-content: space-between;
  font-size: 0.65rem; color: var(--muted); margin-top: 4px; padding: 0 2px;
}

.camera-card {
  background: #1a1a2e; border-radius: 24px; overflow: hidden;
  position: relative; aspect-ratio: 4/3; margin-bottom: 14px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.2); border: 3px solid white;
}
#videoEl { width: 100%; height: 100%; object-fit: cover; display: block; transform: scaleX(-1); }
#overlayCanvas { position: absolute; inset: 0; width: 100%; height: 100%; transform: scaleX(-1); pointer-events: none; }
.cam-placeholder {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 10px; color: rgba(255,255,255,0.4);
}
.cam-ph-icon { font-size: 3.5rem; }
.cam-ph-text { font-size: 0.85rem; }
.detect-badge {
  position: absolute; bottom: 10px; left: 10px; right: 10px;
  background: rgba(255,255,255,0.12); backdrop-filter: blur(10px);
  border-radius: 14px; padding: 8px 12px;
  display: flex; align-items: center; gap: 8px;
  border: 1px solid rgba(255,255,255,0.15);
}
.detect-dot { width: 8px; height: 8px; border-radius: 50%; background: #666; flex-shrink: 0; transition: background 0.3s; }
.detect-dot.live { background: var(--good); animation: blink 1.2s infinite; box-shadow: 0 0 6px var(--good); }
.detect-dot.warn { background: var(--warn); }
.detect-dot.bad  { background: var(--bad); animation: blink 0.6s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
.detect-text { font-size: 0.75rem; color: white; flex: 1; }

/* Loading overlay */
.loading-overlay {
  position: absolute; inset: 0;
  background: rgba(26,26,46,0.92);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 14px; z-index: 10; border-radius: 21px;
}
.loading-overlay.hidden { display: none; }
.load-spinner {
  width: 44px; height: 44px;
  border: 4px solid rgba(255,255,255,0.15);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.9s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.load-text { color: white; font-size: 0.85rem; text-align: center; line-height: 1.6; }
.load-bar-wrap { width: 160px; height: 6px; background: rgba(255,255,255,0.15); border-radius: 10px; overflow: hidden; }
.load-bar { height: 100%; background: var(--accent); border-radius: 10px; width: 0%; transition: width 0.4s; }

.detail-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.detail-card {
  background: white; border-radius: 20px; padding: 14px 14px 12px;
  box-shadow: 0 4px 16px var(--shadow); border: 2px solid var(--border); transition: border-color 0.3s;
}
.detail-card.ok   { border-color: rgba(76,175,130,0.4); }
.detail-card.warn { border-color: rgba(245,166,35,0.4); }
.detail-card.bad  { border-color: rgba(232,93,93,0.4); }
.dc-header { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
.dc-icon { font-size: 1.1rem; }
.dc-name { font-size: 0.75rem; font-weight: 700; color: var(--muted); }
.dc-val { font-size: 1.4rem; font-weight: 900; line-height: 1; margin-bottom: 4px; transition: color 0.3s; }
.dc-mini-bar { height: 5px; background: var(--border); border-radius: 10px; overflow: hidden; }
.dc-mini-fill { height: 100%; border-radius: 10px; transition: width 0.5s ease, background 0.3s; }

.stats-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 14px; }
.stat-card { background: white; border-radius: 18px; padding: 12px 8px; text-align: center; box-shadow: 0 4px 16px var(--shadow); border: 2px solid var(--border); }
.stat-icon { font-size: 1rem; }
.stat-num { font-size: 1.3rem; font-weight: 900; margin: 2px 0 1px; }
.stat-lbl { font-size: 0.65rem; color: var(--muted); }

.settings-card { background: white; border-radius: 20px; padding: 16px; box-shadow: 0 4px 16px var(--shadow); border: 2px solid var(--border); margin-bottom: 14px; }
.settings-title { font-size: 0.8rem; font-weight: 900; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 12px; }
.setting-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.setting-row:last-child { margin-bottom: 0; }
.setting-lbl { flex: 1; font-size: 0.82rem; }
.setting-row input[type=range] { width: 90px; accent-color: var(--accent); }
.setting-val { font-weight: 900; font-size: 0.82rem; min-width: 36px; text-align: right; color: var(--accent); }

.btn-main {
  display: block; width: 100%; padding: 16px; border: none; border-radius: 20px;
  font-family: inherit; font-size: 1.05rem; font-weight: 900;
  cursor: pointer; transition: all 0.2s; margin-bottom: 14px;
}
.btn-main.start { background: linear-gradient(135deg, #4CAF82, #2E9E6A); color: white; box-shadow: 0 6px 24px rgba(76,175,130,0.4); }
.btn-main.stop  { background: linear-gradient(135deg, #E85D5D, #D44); color: white; box-shadow: 0 6px 24px rgba(232,93,93,0.35); }
.btn-main:hover { transform: translateY(-2px); filter: brightness(1.05); }
.btn-main:active { transform: translateY(1px); }
.btn-main:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

.alert-pop {
  position: fixed; bottom: -220px; left: 50%; transform: translateX(-50%);
  width: min(360px, 92vw); background: white; border-radius: 28px;
  border: 3px solid var(--bad); padding: 22px 24px; text-align: center;
  box-shadow: 0 24px 60px rgba(0,0,0,0.18); z-index: 200;
  transition: bottom 0.5s cubic-bezier(0.34,1.56,0.64,1);
}
.alert-pop.show { bottom: 24px; }
.alert-pop-emoji { font-size: 3.5rem; }
.alert-pop-title { font-size: 1.3rem; font-weight: 900; color: var(--bad); margin: 8px 0 6px; }
.alert-pop-reason { font-size: 0.82rem; color: var(--muted); margin-bottom: 10px; }
.alert-pop-msg { font-size: 0.95rem; font-weight: 700; }

.log-card { background: white; border-radius: 20px; padding: 14px 16px; box-shadow: 0 4px 16px var(--shadow); border: 2px solid var(--border); max-height: 160px; overflow-y: auto; }
.log-title { font-size: 0.75rem; font-weight: 900; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
.log-item { display: flex; gap: 8px; padding: 4px 0; border-bottom: 1px solid var(--border); font-size: 0.78rem; }
.log-item:last-child { border: none; }
.log-time { color: var(--muted); font-size: 0.7rem; white-space: nowrap; }
.log-txt { flex: 1; }
.log-item.is-alert .log-txt { color: var(--bad); font-weight: 700; }
.log-item.is-good  .log-txt { color: var(--good); font-weight: 700; }

.confetti-wrap { position: fixed; inset: 0; pointer-events: none; z-index: 999; overflow: hidden; }
.confetti-p { position: absolute; border-radius: 2px; animation: fall linear forwards; }
@keyframes fall { 0%{transform:translateY(-20px) rotate(0deg);opacity:1} 100%{transform:translateY(105vh) rotate(720deg);opacity:0} }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-inner">
      <span class="h-icon">⭐</span>
      <span class="h-title">しゅうちゅう<em>モニター</em></span>
    </div>
  </div>

  <div class="score-card" id="scoreCard">
    <span class="score-face" id="scoreFace">😴</span>
    <div class="score-label" id="scoreLabel">カメラをスタートしよう！</div>
    <div class="score-sub" id="scoreSub">下のボタンを押してね</div>
    <div class="gauge-wrap"><div class="gauge-fill" id="gaugeFill" style="width:0%"></div></div>
    <div class="gauge-labels"><span>集中切れ</span><span>集中中 ✨</span></div>
  </div>

  <div class="camera-card">
    <video id="videoEl" autoplay playsinline muted></video>
    <canvas id="overlayCanvas"></canvas>
    <div class="cam-placeholder" id="camPlaceholder">
      <div class="cam-ph-icon">📷</div>
      <div class="cam-ph-text">カメラをスタートしてね</div>
    </div>
    <div class="loading-overlay hidden" id="loadingOverlay">
      <div class="load-spinner"></div>
      <div class="load-text" id="loadText">AIモデルを読み込み中…<br>少し待ってね</div>
      <div class="load-bar-wrap"><div class="load-bar" id="loadBar"></div></div>
    </div>
    <div class="detect-badge">
      <div class="detect-dot" id="detectDot"></div>
      <div class="detect-text" id="detectText">待機中</div>
    </div>
  </div>

  <div class="detail-row">
    <div class="detail-card" id="dc-gaze">
      <div class="dc-header"><span class="dc-icon">👀</span><span class="dc-name">視線</span></div>
      <div class="dc-val" id="dv-gaze">--</div>
      <div class="dc-mini-bar"><div class="dc-mini-fill" id="db-gaze" style="width:0%"></div></div>
    </div>
    <div class="detail-card" id="dc-posture">
      <div class="dc-header"><span class="dc-icon">🪑</span><span class="dc-name">姿勢</span></div>
      <div class="dc-val" id="dv-posture">--</div>
      <div class="dc-mini-bar"><div class="dc-mini-fill" id="db-posture" style="width:0%"></div></div>
    </div>
    <div class="detail-card" id="dc-eyes">
      <div class="dc-header"><span class="dc-icon">😶</span><span class="dc-name">目の開き</span></div>
      <div class="dc-val" id="dv-eyes">--</div>
      <div class="dc-mini-bar"><div class="dc-mini-fill" id="db-eyes" style="width:0%"></div></div>
    </div>
    <div class="detail-card" id="dc-face">
      <div class="dc-header"><span class="dc-icon">🔍</span><span class="dc-name">顔の検出</span></div>
      <div class="dc-val" id="dv-face">--</div>
      <div class="dc-mini-bar"><div class="dc-mini-fill" id="db-face" style="width:0%"></div></div>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat-card"><div class="stat-icon">⏱️</div><div class="stat-num" id="statFocusTime">0:00</div><div class="stat-lbl">集中時間</div></div>
    <div class="stat-card"><div class="stat-icon">🔔</div><div class="stat-num" id="statAlerts">0</div><div class="stat-lbl">声がけ</div></div>
    <div class="stat-card"><div class="stat-icon">📊</div><div class="stat-num" id="statRate">--</div><div class="stat-lbl">集中率</div></div>
  </div>

  <div class="settings-card">
    <div class="settings-title">⚙ せってい</div>
    <div class="setting-row">
      <span class="setting-lbl">🔔 声がけまでの時間</span>
      <input type="range" id="threshSlider" min="3" max="20" value="8" step="1">
      <span class="setting-val" id="threshVal">8秒</span>
    </div>
    <div class="setting-row">
      <span class="setting-lbl">🔊 音量</span>
      <input type="range" id="volSlider" min="0" max="1" value="0.8" step="0.1">
      <span class="setting-val" id="volVal">80%</span>

  <button class="btn-main start" id="mainBtn">📷 カメラをスタート</button>

</div>

<div class="alert-pop" id="alertPop">
  <div class="alert-pop-emoji" id="apEmoji">😮</div>
  <div class="alert-pop-title" id="apTitle">集中しよう！</div>
  <div class="alert-pop-reason" id="apReason"></div>
  <div class="alert-pop-msg" id="apMsg">もうひとふんばりできるよ！</div>
</div>
<div class="confetti-wrap" id="confettiWrap"></div>

<!-- face-api.js: lighter and more reliable than MediaPipe on mobile -->
<script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

<script>
const MODELS_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model';

const S = {
  running: false, thresh: 8, volume: 0.8,
  focusSec: 0, totalSec: 0, alertCount: 0,
  alertCooldown: false, unfocusedSec: 0, focusedSec: 0,
  timer: null, lastFocused: false, modelsLoaded: false,
};

const ALERTS = [
  { emoji:'😊', title:'集中しよう！', msg:'勉強がんばれ！きみならできる！' },
  { emoji:'💪', title:'もうひとふんばり！', msg:'あとすこしで終わるよ！' },
  { emoji:'👀', title:'テキストを見てみよう！', msg:'目線を本に戻してね！' },
  { emoji:'🌟', title:'集中モード、オン！', msg:'深呼吸して集中しよう！' },
  { emoji:'🚀', title:'ファイト！', msg:'集中パワーを出して！' },
  { emoji:'📚', title:'本を見てね！', msg:'もうすこしがんばれ！' },
];

// Elements
const videoEl        = document.getElementById('videoEl');
const overlayCanvas  = document.getElementById('overlayCanvas');
const ctx            = overlayCanvas.getContext('2d');
const camPlaceholder = document.getElementById('camPlaceholder');
const loadingOverlay = document.getElementById('loadingOverlay');
const loadText       = document.getElementById('loadText');
const loadBar        = document.getElementById('loadBar');
const scoreCard      = document.getElementById('scoreCard');
const scoreFace      = document.getElementById('scoreFace');
const scoreLabel     = document.getElementById('scoreLabel');
const scoreSub       = document.getElementById('scoreSub');
const gaugeFill      = document.getElementById('gaugeFill');
const detectDot      = document.getElementById('detectDot');
const detectText     = document.getElementById('detectText');
const alertPop       = document.getElementById('alertPop');
const mainBtn        = document.getElementById('mainBtn');
const logList        = document.getElementById('logList');

document.getElementById('threshSlider').addEventListener('input', e => {
  S.thresh = +e.target.value;
  document.getElementById('threshVal').textContent = e.target.value + '秒';
});
document.getElementById('volSlider').addEventListener('input', e => {
  S.volume = +e.target.value;
  document.getElementById('volVal').textContent = Math.round(S.volume*100) + '%';
});

// ===== LOAD MODELS =====
async function loadModels() {
  loadingOverlay.classList.remove('hidden');
  loadText.textContent = 'AIモデルを読み込み中…\n少し待ってね';
  loadBar.style.width = '10%';

  try {
    // Use vladmandic's CDN which is more reliable
    const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model';
    await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
    loadBar.style.width = '40%';
    await faceapi.nets.faceLandmark68TinyNet.loadFromUri(MODEL_URL);
    loadBar.style.width = '70%';
    await faceapi.nets.faceExpressionNet.loadFromUri(MODEL_URL);
    loadBar.style.width = '100%';
    S.modelsLoaded = true;
    loadingOverlay.classList.add('hidden');
    addLog('✅ AIモデル読み込み完了！', false, true);
    return true;
  } catch(e) {
    loadText.textContent = '読み込みに失敗…\nリロードしてみてね';
    addLog('❌ モデル読み込みエラー: ' + e.message);
    return false;
  }
}

// ===== ANALYSIS =====
const history = [];
const HIST = 6;

function analyzeDetection(det) {
  const lm = det.landmarks;
  const expr = det.expressions;
  const pos  = det.detection.box;

  // --- HEAD POSE from landmarks ---
  const nose     = lm.getNose();
  const leftEye  = lm.getLeftEye();
  const rightEye = lm.getRightEye();
  const jaw      = lm.getJawOutline();

  // Face height
  const faceTop    = Math.min(...leftEye.map(p=>p.y), ...rightEye.map(p=>p.y));
  const faceBottom = jaw[8].y;
  const faceH      = faceBottom - faceTop;

  // Nose tip relative position (pitch - up/down)
  const noseTip = nose[3];
  const noseRatio = faceH > 1 ? (noseTip.y - faceTop) / faceH : 0.5;
  // Normal ~0.55. Up: <0.4. Down: >0.75
  const lookingUp   = noseRatio < 0.38;
  const lookingDown = noseRatio > 0.76;

  // Head roll (tilt) from eye positions
  const lEyeCenter = { x: leftEye.reduce((s,p)=>s+p.x,0)/leftEye.length, y: leftEye.reduce((s,p)=>s+p.y,0)/leftEye.length };
  const rEyeCenter = { x: rightEye.reduce((s,p)=>s+p.x,0)/rightEye.length, y: rightEye.reduce((s,p)=>s+p.y,0)/rightEye.length };
  const eyeDx = rEyeCenter.x - lEyeCenter.x;
  const eyeDy = rEyeCenter.y - lEyeCenter.y;
  const eyeW  = Math.sqrt(eyeDx*eyeDx + eyeDy*eyeDy);
  const tiltRatio = eyeW > 1 ? Math.abs(eyeDy) / eyeW : 0;
  const headTilted = tiltRatio > 0.18;

  // --- EYE OPENNESS ---
  function eyeAspectRatio(pts) {
    // pts: 6 points of eye
    const h1 = Math.abs(pts[1].y - pts[5].y);
    const h2 = Math.abs(pts[2].y - pts[4].y);
    const w  = Math.abs(pts[0].x - pts[3].x);
    return w > 0 ? (h1 + h2) / (2 * w) : 0;
  }
  const lEAR = eyeAspectRatio(leftEye);
  const rEAR = eyeAspectRatio(rightEye);
  const ear  = (lEAR + rEAR) / 2;
  // Normal ~0.25-0.35. Closed: <0.18. Droopy: <0.22
  const eyesClosed = ear < 0.17;
  const eyesDroopy = ear < 0.21 && !eyesClosed;

  // --- EXPRESSIONS ---
  const tired    = (expr.sleepy || 0) > 0.3;
  const surprised = (expr.surprised || 0) > 0.5; // looking up often triggers surprised
  const neutral  = (expr.neutral || 0) > 0.4;
  const disgusted = (expr.disgusted || 0) > 0.3;

  // --- SCORES ---
  let gazeScore = 100;
  if (lookingUp)    gazeScore -= 60;
  if (lookingDown)  gazeScore -= 20;
  gazeScore = Math.max(0, gazeScore);

  let postureScore = 100;
  if (headTilted)   postureScore -= 55;
  if (lookingDown)  postureScore -= 35;
  postureScore = Math.max(0, postureScore);

  let eyeScore = 100;
  if (eyesClosed)  eyeScore = 5;
  else if (eyesDroopy) eyeScore = 45;
  if (tired) eyeScore = Math.min(eyeScore, 40);
  eyeScore = Math.max(0, eyeScore);

  // Expression bonus/penalty
  let exprBonus = 0;
  if (neutral) exprBonus += 10;
  if (disgusted) exprBonus -= 15;

  const overall = Math.round(Math.min(100, Math.max(0,
    gazeScore * 0.35 + postureScore * 0.30 + eyeScore * 0.35 + exprBonus
  )));

  const reasons = [];
  if (lookingUp)    reasons.push('上を向いてるよ 👆');
  if (headTilted)   reasons.push('頭が傾いてるよ 😪');
  if (lookingDown)  reasons.push('うつむいてるよ 👇');
  if (eyesClosed)   reasons.push('目が閉じてるよ 😴');
  else if(eyesDroopy || tired) reasons.push('眠そうだよ 🥱');

  return { gazeScore, postureScore, eyeScore, overall, reasons, focused: overall >= 60 };
}

// ===== DRAW =====
function drawOverlay(det, result) {
  overlayCanvas.width  = videoEl.videoWidth  || overlayCanvas.clientWidth;
  overlayCanvas.height = videoEl.videoHeight || overlayCanvas.clientHeight;
  ctx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);

  const col = result.focused ? 'rgba(76,175,130,0.7)' : 'rgba(232,93,93,0.7)';
  const lm = det.landmarks;

  // Draw eyes
  [lm.getLeftEye(), lm.getRightEye()].forEach(eye => {
    ctx.beginPath();
    eye.forEach((p,i) => i===0 ? ctx.moveTo(p.x,p.y) : ctx.lineTo(p.x,p.y));
    ctx.closePath();
    ctx.strokeStyle = col;
    ctx.lineWidth = 2;
    ctx.stroke();
  });

  // Nose dot
  const nose = lm.getNose();
  const tip = nose[3];
  ctx.beginPath();
  ctx.arc(tip.x, tip.y, 4, 0, Math.PI*2);
  ctx.fillStyle = col;
  ctx.fill();

  // Face box (subtle)
  const box = det.detection.box;
  ctx.strokeStyle = col.replace('0.7','0.3');
  ctx.lineWidth = 1.5;
  ctx.strokeRect(box.x, box.y, box.width, box.height);
}

// ===== UI =====
function updateDetailCard(id, score, label) {
  const col = score >= 70 ? 'var(--good)' : score >= 45 ? 'var(--warn)' : 'var(--bad)';
  const cls = score >= 70 ? 'ok' : score >= 45 ? 'warn' : 'bad';
  document.getElementById('dc-'+id).className = 'detail-card ' + cls;
  const v = document.getElementById('dv-'+id);
  v.textContent = label; v.style.color = col;
  const b = document.getElementById('db-'+id);
  b.style.width = score+'%'; b.style.background = col;
}

function updateUI(result) {
  const f = result.focused;
  scoreCard.className = 'score-card ' + (f ? 'ok' : result.overall >= 45 ? 'warn' : 'bad');
  scoreFace.textContent = f ? '😊' : result.overall >= 45 ? '😕' : '😵';
  scoreLabel.textContent = f ? '集中してるね！すごい！' : (result.reasons[0] || '集中が切れてるかも？');
  scoreSub.textContent = f ? '✨ このちょうしでがんばれ！' : result.reasons.slice(1).join(' ') || '';
  gaugeFill.style.width = result.overall + '%';
  gaugeFill.style.background = result.overall>=70?'var(--good)':result.overall>=45?'var(--warn)':'var(--bad)';
  detectDot.className = 'detect-dot ' + (f ? 'live' : 'bad');
  detectText.textContent = f ? '集中しているよ！' : (result.reasons[0] || 'ちょっと集中が切れてる');
  updateDetailCard('gaze',    result.gazeScore,    result.gazeScore>=70?'◎ よい':result.gazeScore>=45?'△ 注意':'× NG');
  updateDetailCard('posture', result.postureScore, result.postureScore>=70?'◎ よい':result.postureScore>=45?'△ 注意':'× NG');
  updateDetailCard('eyes',    result.eyeScore,     result.eyeScore>=70?'◎ よい':result.eyeScore>=45?'△ 眠い':'× 閉じ');
  updateDetailCard('face',    100, '◎ 検出中');
}

function updateNoFace() {
  scoreCard.className = 'score-card warn';
  scoreFace.textContent = '🔍';
  scoreLabel.textContent = '顔が見えないよ…';
  scoreSub.textContent = 'カメラの前に座ってね';
  gaugeFill.style.width = '0%';
  detectDot.className = 'detect-dot warn';
  detectText.textContent = '顔を検出中…';
  updateDetailCard('face', 0, '× 未検出');
  ['gaze','posture','eyes'].forEach(k => {
    document.getElementById('dv-'+k).textContent = '--';
    document.getElementById('db-'+k).style.width = '0%';
    document.getElementById('dc-'+k).className = 'detail-card';
  });
}

// ===== DETECTION LOOP =====
let loopRunning = false;

async function detectionLoop() {
  if (!S.running || !S.modelsLoaded) return;
  loopRunning = true;

  try {
    const dets = await faceapi
      .detectAllFaces(videoEl, new faceapi.TinyFaceDetectorOptions({ inputSize: 224, scoreThreshold: 0.4 }))
      .withFaceLandmarks(true)
      .withFaceExpressions();

    if (!S.running) return;

    overlayCanvas.width  = videoEl.videoWidth  || overlayCanvas.clientWidth;
    overlayCanvas.height = videoEl.videoHeight || overlayCanvas.clientHeight;

    if (dets && dets.length > 0) {
      const det = dets[0];
      const result = analyzeDetection(det);
      history.push({ focused: result.focused });
      if (history.length > HIST) history.shift();
      drawOverlay(det, result);
      updateUI(result);
      S.lastFocused = result.focused;
    } else {
      ctx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
      updateNoFace();
      S.lastFocused = false;
    }
  } catch(e) {
    // silently continue
  }

  loopRunning = false;
  if (S.running) setTimeout(detectionLoop, 800); // run every 800ms - good balance
}

// ===== TIMER =====
function startTimer() {
  if (S.timer) clearInterval(S.timer);
  S.timer = setInterval(() => {
    if (!S.running) return;
    S.totalSec++;
    if (S.lastFocused) {
      S.focusSec++;
      S.focusedSec++;
      S.unfocusedSec = 0;
      if (S.focusedSec === 300) celebrate();
    } else {
      S.unfocusedSec++;
      S.focusedSec = 0;
      if (S.unfocusedSec >= S.thresh && !S.alertCooldown) triggerAlert();
    }
    const m = Math.floor(S.focusSec/60), sec = S.focusSec%60;
    document.getElementById('statFocusTime').textContent = m+':'+String(sec).padStart(2,'0');
    if (S.totalSec > 0) document.getElementById('statRate').textContent = Math.round(S.focusSec/S.totalSec*100)+'%';
  }, 1000);
}

// ===== ALERT =====
function triggerAlert() {
  S.alertCooldown = true; S.alertCount++;
  document.getElementById('statAlerts').textContent = S.alertCount;
  const a = ALERTS[S.alertCount % ALERTS.length];
  document.getElementById('apEmoji').textContent = a.emoji;
  document.getElementById('apTitle').textContent = a.title;
  document.getElementById('apReason').textContent = '';
  document.getElementById('apMsg').textContent = a.msg;
  alertPop.classList.add('show');
  speak(a.title + '。' + a.msg);
  addLog(a.emoji + ' ' + a.title, true, false);
  setTimeout(() => {
    alertPop.classList.remove('show');
    S.unfocusedSec = 0;
    setTimeout(() => { S.alertCooldown = false; }, S.thresh * 1500);
  }, 3500);
}

function speak(text) {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'ja-JP'; u.rate = 0.92; u.pitch = 1.1; u.volume = S.volume;
  const v = speechSynthesis.getVoices().find(v => v.lang.startsWith('ja'));
  if (v) u.voice = v;
  speechSynthesis.speak(u);
}

function celebrate() {
  const wrap = document.getElementById('confettiWrap');
  const cols = ['#f87171','#fbbf24','#4ade80','#60a5fa','#a78bfa','#fb923c'];
  for (let i = 0; i < 80; i++) {
    const el = document.createElement('div'); el.className = 'confetti-p';
    const sz = 6 + Math.random()*10;
    el.style.cssText = `left:${Math.random()*100}%;top:-15px;background:${cols[~~(Math.random()*cols.length)]};width:${sz}px;height:${sz}px;animation-duration:${1.5+Math.random()*2.5}s;animation-delay:${Math.random()*0.5}s;`;
    wrap.appendChild(el); setTimeout(() => el.remove(), 5000);
  }
  speak('すごい！5分間よく集中できたね！さいこう！');
  addLog('🎉 5分間集中達成！', false, true);
}

function addLog(text, isAlert=false, isGood=false) {
  const n = new Date();
  const t = n.getHours()+':'+String(n.getMinutes()).padStart(2,'0')+':'+String(n.getSeconds()).padStart(2,'0');
  const d = document.createElement('div');
  d.className = 'log-item'+(isAlert?' is-alert':isGood?' is-good':'');
  d.innerHTML = `<span class="log-time">${t}</span><span class="log-txt">${text}</span>`;
  logList.prepend(d);
  if (logList.children.length > 40) logList.removeChild(logList.lastChild);
}

// ===== START / STOP =====
async function startMonitor() {
  mainBtn.disabled = true;
  mainBtn.textContent = '起動中…';

  // 1. Start camera first
  try {
    const stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:320,height:240}});
    videoEl.srcObject = stream;
    await videoEl.play();
    camPlaceholder.style.display = 'none';
  } catch(e) {
    addLog('❌ カメラエラー: ' + e.message);
    mainBtn.disabled = false; mainBtn.textContent = '📷 カメラをスタート'; mainBtn.className = 'btn-main start';
    return;
  }

  // 2. Load models (shows loading overlay on camera)
  if (!S.modelsLoaded) {
    const ok = await loadModels();
    if (!ok) {
      mainBtn.disabled = false; mainBtn.textContent = '📷 カメラをスタート'; mainBtn.className = 'btn-main start';
      return;
    }
  }

  // 3. Start
  S.running = true;
  S.focusSec = 0; S.totalSec = 0; S.alertCount = 0;
  S.unfocusedSec = 0; S.focusedSec = 0; S.alertCooldown = false; S.lastFocused = false;
  history.length = 0;
  document.getElementById('statFocusTime').textContent = '0:00';
  document.getElementById('statAlerts').textContent = '0';
  document.getElementById('statRate').textContent = '--';
  logList.innerHTML = '';

  mainBtn.disabled = false;
  mainBtn.className = 'btn-main stop';
  mainBtn.textContent = '⏹ ストップ';
  detectDot.className = 'detect-dot live';
  detectText.textContent = '検出中…';
  addLog('📷 モニタリング開始', false, true);
  startTimer();
  detectionLoop();
}

function stopMonitor() {
  S.running = false;
  if (S.timer) clearInterval(S.timer);
  if (videoEl.srcObject) { videoEl.srcObject.getTracks().forEach(t => t.stop()); videoEl.srcObject = null; }
  ctx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
  camPlaceholder.style.display = 'flex';
  alertPop.classList.remove('show');
  scoreCard.className = 'score-card';
  scoreFace.textContent = '😴';
  scoreLabel.textContent = 'おつかれさま！';
  scoreSub.textContent = '集中時間: ' + document.getElementById('statFocusTime').textContent;
  gaugeFill.style.width = '0%';
  detectDot.className = 'detect-dot';
  detectText.textContent = '待機中';
  mainBtn.className = 'btn-main start';
  mainBtn.textContent = '📷 カメラをスタート';
  addLog('⏹ 終了（集中時間: ' + document.getElementById('statFocusTime').textContent + '）');
  speechSynthesis && speechSynthesis.cancel();
}

mainBtn.addEventListener('click', () => { if (S.running) stopMonitor(); else startMonitor(); });
window.addEventListener('load', () => {
  if (window.speechSynthesis) { speechSynthesis.getVoices(); speechSynthesis.addEventListener('voiceschanged', () => speechSynthesis.getVoices()); }
});
</script>
