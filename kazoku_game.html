<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>だれをみてる？ 👀</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html {
            width: 100%; height: 100%;
            overflow: hidden;
            background: #FFFDE7;
            font-family: Arial, sans-serif;
            user-select: none; -webkit-user-select: none;
        }

        /* ===== 共通画面 ===== */
        .screen {
            position: fixed; inset: 0;
            display: none; flex-direction: column;
            justify-content: center; align-items: center;
            gap: 24px; z-index: 500;
            padding: 32px; text-align: center;
        }
        .screen.active { display: flex; }

        /* ===== タップスタート ===== */
        #s-tap { background: #FFFDE7; }
        #s-tap .big-emoji { font-size: 72px; }
        #s-tap h1 { font-size: 28px; color: #444; }
        #s-tap .sub { font-size: 15px; color: #888; line-height: 1.8; }
        .tap-btn {
            padding: 20px 48px;
            font-size: 22px; font-weight: bold;
            background: #FF5252; color: white;
            border: none; border-radius: 20px;
            box-shadow: 0 6px 20px rgba(255,82,82,0.4);
            cursor: pointer;
            animation: btnpulse 1.5s ease-in-out infinite;
        }
        @keyframes btnpulse {
            0%,100% { transform: scale(1); }
            50%      { transform: scale(1.05); }
        }

        /* ===== レイアウト選択 ===== */
        #s-layout { background: #FFFDE7; }
        #s-layout h2 { font-size: 22px; color: #444; }
        .layout-options { display: flex; gap: 24px; flex-wrap: wrap; justify-content: center; }
        .layout-btn {
            width: 150px; padding: 22px 14px;
            background: white; border: 5px solid #ddd; border-radius: 20px;
            cursor: pointer; display: flex; flex-direction: column;
            align-items: center; gap: 14px;
            font-size: 15px; font-weight: bold; color: #555;
            box-shadow: 0 4px 14px rgba(0,0,0,0.1);
        }
        .layout-btn:active { transform: scale(0.95); border-color: #FF5252; }
        .layout-icon { font-size: 42px; }

        /* ===== 読み込み ===== */
        #s-loading { background: #FFFDE7; }
        .spinner {
            width: 56px; height: 56px;
            border: 7px solid #ddd; border-top-color: #FF5252;
            border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #load-msg { font-size: 20px; font-weight: bold; color: #444; }
        .load-sub { font-size: 14px; color: #888; }

        /* ===== キャリブレーション ===== */
        #calib-area {
            position: fixed; inset: 0;
            display: none; z-index: 600;
            background: rgba(20,20,40,0.90);
        }
        .cdot {
            position: absolute;
            transform: translate(-50%,-50%);
            cursor: pointer;
        }
        .cdot-inner {
            width: 88px; height: 88px;
            background: #FF5252; border-radius: 50%;
            border: 5px solid white;
            animation: dotpulse 1.2s ease-in-out infinite;
            display: flex; align-items: center; justify-content: center;
            font-size: 40px;
        }
        @keyframes dotpulse {
            0%   { box-shadow:0 0 0 0 rgba(255,82,82,0.6); transform:scale(1); }
            50%  { box-shadow:0 0 0 26px rgba(255,82,82,0); transform:scale(1.09); }
            100% { box-shadow:0 0 0 0 rgba(255,82,82,0); transform:scale(1); }
        }
        .cdot.done .cdot-inner { background:#4CAF50; animation:none; }
        #calib-label {
            position: fixed; top: 0; left: 0; width: 100%;
            padding: 18px 20px; background: rgba(0,0,0,0.55);
            text-align: center; font-size: 16px; font-weight: bold; color: white;
            z-index: 700; line-height: 1.7;
        }
        #calib-prog {
            position: fixed; bottom: 30px; left: 0; width: 100%;
            text-align: center; font-size: 16px; color: rgba(255,255,255,0.85);
            z-index: 700;
        }
        #calib-sample-bar-wrap {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 10px;
            background: rgba(255,255,255,0.15); z-index: 700;
        }
        #calib-sample-bar { height:100%; width:0%; background:#4CAF50; transition:width 0.08s linear; }

        /* ===== ゲーム ===== */
        #game {
            position: fixed; inset: 0;
            display: none;
        }
        #game.active { display: flex; }

        /* 縦並び */
        #game.vertical {
            flex-direction: column;
            justify-content: space-around;
            align-items: center;
            padding: 8px 0;
        }
        #game.vertical .card {
            width: 94%; height: 44%;
            flex-direction: row;
            padding: 0; gap: 0;
        }
        #game.vertical .face-img {
            height: 100%;
            width: 50%;
            object-fit: cover;
            object-position: center top;
            border-radius: 20px 0 0 20px;
            flex-shrink: 0;
        }

        /* 横並び */
        #game.horizontal {
            flex-direction: row;
            justify-content: space-around;
            align-items: center;
            padding: 0 8px;
        }
        #game.horizontal .card {
            width: 46%; height: 92%;
            flex-direction: column;
            padding: 0; gap: 0;
        }
        #game.horizontal .face-img {
            width: 100%;
            height: 75%;
            object-fit: cover;
            object-position: center top;
            border-radius: 20px 20px 0 0;
            flex-shrink: 0;
        }

        .card {
            background: white;
            border: 8px solid #ddd; border-radius: 28px;
            display: flex; justify-content: center; align-items: center;
            position: relative; overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
            transition: border-color 0.15s, transform 0.15s, background 0.15s;
        }
        .card.gazing {
            border-color: #FF5252;
            transform: scale(1.04);
            background: #FFF3F3;
        }
        .face-img {
            display: block;
        }
        .card .name {
            font-size: clamp(24px, 7vw, 48px);
            font-weight: bold; color: #444;
            white-space: nowrap;
            flex: 1;
            text-align: center;
        }
        .dwell {
            position: absolute; bottom: 0; left: 0;
            height: 14px; width: 0%;
            background: linear-gradient(90deg, #4CAF50, #8BC34A);
            border-radius: 0 0 20px 20px;
            transition: width 0.06s linear;
        }
        @keyframes selected-anim {
            0%,100% { transform: scale(1.04); }
            40%     { transform: scale(1.12); }
        }
        .card.selected-card {
            animation: selected-anim 0.4s ease-in-out infinite;
            border-color: #FF5252; background: #FFF0F0;
        }

        /* カメラ */
        #cam-wrap {
            position: fixed; bottom: 12px; right: 12px;
            width: 90px; height: 68px;
            border: 3px solid #333; border-radius: 10px;
            overflow: hidden; background: #000; z-index: 200;
        }
        #video { width:100%; height:100%; object-fit:cover; transform:scaleX(-1); display:block; }

        /* カーソル */
        #cursor {
            position: fixed; width: 36px; height: 36px; border-radius: 50%;
            background: rgba(255,50,50,0.8);
            border: 3px solid rgba(255,255,255,0.95);
            box-shadow: 0 0 12px rgba(255,0,0,0.5);
            pointer-events: none; z-index: 300;
            transform: translate(-50%,-50%); display: none;
        }

        /* ステータス */
        #status {
            position: fixed; top: 14px; left: 0; width: 100%;
            text-align: center; font-size: clamp(16px,4vw,24px);
            font-weight: bold; color: #333; z-index: 100; pointer-events: none;
            text-shadow: 0 1px 4px rgba(255,255,255,0.9);
        }

        /* 戻るボタン */
        #btn-reset {
            position: fixed; top: 14px; left: 14px;
            padding: 10px 18px;
            font-size: 15px; font-weight: bold;
            background: rgba(0,0,0,0.35); color: white;
            border: 2px solid rgba(255,255,255,0.65);
            border-radius: 24px; cursor: pointer;
            z-index: 400; display: none;
            backdrop-filter: blur(4px);
        }

        /* エラー */
        #s-error { background: #fff3f3; color: #c00; }
        .err-sub { font-size: 14px; color: #e57373; line-height:1.7; max-width:320px; }
        .err-btn {
            padding:14px 32px; font-size:18px;
            background:#FF5252; color:white;
            border:none; border-radius:14px; cursor:pointer;
        }
    </style>
</head>
<body>

<!-- タップスタート -->
<div class="screen active" id="s-tap">
    <div class="big-emoji">👦👵</div>
    <h1>だれをみてる？</h1>
    <p class="sub">見たい人を目線で選ぼう！<br>はじめにカメラの準備をします</p>
    <button class="tap-btn" id="btn-tap">タップしてスタート 👆</button>
</div>

<!-- レイアウト選択 -->
<div class="screen" id="s-layout">
    <h2>ならびかたを選んでください</h2>
    <p class="sub">画面の向きに合わせてね</p>
    <div class="layout-options">
        <div class="layout-btn" id="btn-vertical">
            <div class="layout-icon">📱</div>
            <span>たて<br>（スマホ）</span>
        </div>
        <div class="layout-btn" id="btn-horizontal">
            <div class="layout-icon">📺</div>
            <span>よこ<br>（タブレット）</span>
        </div>
    </div>
</div>

<!-- 読み込み -->
<div class="screen" id="s-loading">
    <div class="spinner"></div>
    <div id="load-msg">読み込み中...</div>
    <div class="load-sub">初回は20〜30秒かかります</div>
</div>

<!-- キャリブレーション -->
<div id="calib-area">
    <div id="calib-label">
        👁️ 子どもに赤い点を見せてください<br>
        目線が合ったら　大人の方がタップして登録
    </div>
    <div id="calib-prog"></div>
    <div id="calib-sample-bar-wrap">
        <div id="calib-sample-bar"></div>
    </div>
</div>

<script type="module">
import { FaceLandmarker, FilesetResolver }
    from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/vision_bundle.mjs";

// ============================================================
//  パラメーター
// ============================================================
const DWELL_MS    = 1400;
const COOLDOWN_MS = 2500;
const SMOOTH_K    = 0.14;
const MARGIN_PX   = 50;
const L_IRIS      = 468;
const R_IRIS      = 473;
const L_EYE_OUTER = 33,  L_EYE_INNER = 133;
const R_EYE_OUTER = 263, R_EYE_INNER = 362;
const DWELL_WINDOW_MS = 1500;
const DWELL_MIN_PTS   = 6;

const CALIB_PTS = [
    [50,12],[15,12],[85,12],
    [50,50],[15,50],[85,50],
    [50,88],[15,88],[85,88],
];
const MIN_SAMPLES = 8;
const MAX_SAMPLES = 40;

const VOICES = [
    { label: "おにぃ", displayLabel: "オニイ", status: "オニイ 👦" },
    { label: "おばあ", displayLabel: "オバア", status: "オバア 👵" },
];

// ============================================================
//  状態
// ============================================================
const video  = document.getElementById("video");
const cursor = document.getElementById("cursor");

let landmarker = null;
let calibIdx=0, calibData=[], calibBuf=[], calibCollecting=false, calibDone=false;
let regX=null, regY=null;
let calibFaceCenterX=null, calibFaceCenterY=null;
let gazeX=window.innerWidth/2, gazeY=window.innerHeight/2;
let gazeHistory=[];
let curSel=-1, selStart=0, lastDecide=0, gameReady=false;
let lastVideoTime=-1;
let currentEyeX=null, currentEyeY=null;
let onlineData=[];

// ============================================================
//  画面切替
// ============================================================
function showScreen(id) {
    document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
    if (id) document.getElementById(id)?.classList.add("active");
}

// ============================================================
//  音声（Web Speech API — タップ後に初期化）
// ============================================================
function initSpeech() {
    // タップ直後に空発話してiOSでも確実に動かす
    const u = new SpeechSynthesisUtterance(" ");
    u.volume = 0;
    speechSynthesis.speak(u);
}

function speakForCard(idx) {
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(VOICES[idx].label);
    u.lang  = "ja-JP";
    u.rate  = 0.72;
    u.pitch = 1.1;
    u.volume= 1.0;
    speechSynthesis.speak(u);
}

// ============================================================
//  線形回帰
// ============================================================
function fitLinear(data, key) {
    const n=data.length; if(n<4) return null;
    let sx=0,sy=0,sz=0,sx2=0,sy2=0,sxy=0,sxz=0,syz=0;
    data.forEach(d=>{const x=d.eyeX,y=d.eyeY,z=d[key];
        sx+=x;sy+=y;sz+=z;sx2+=x*x;sy2+=y*y;sxy+=x*y;sxz+=x*z;syz+=y*z;});
    const A=[[sx2,sxy,sx,sxz],[sxy,sy2,sy,syz],[sx,sy,n,sz]];
    for(let c=0;c<3;c++){
        let mx=c;
        for(let r=c+1;r<3;r++) if(Math.abs(A[r][c])>Math.abs(A[mx][c])) mx=r;
        [A[c],A[mx]]=[A[mx],A[c]];
        if(Math.abs(A[c][c])<1e-10) return null;
        for(let r=c+1;r<3;r++){const f=A[r][c]/A[c][c];for(let k=c;k<4;k++)A[r][k]-=f*A[c][k];}
    }
    const cc=A[2][3]/A[2][2],b=(A[1][3]-A[1][2]*cc)/A[1][1],a=(A[0][3]-A[0][2]*cc-A[0][1]*b)/A[0][0];
    return {a,b,c:cc};
}
function predictGaze(ex,ey){
    if(!regX||!regY) return null;
    return {x:regX.a*ex+regX.b*ey+regX.c, y:regY.a*ex+regY.b*ey+regY.c};
}

// ============================================================
//  ④ 顔の傾き補正
// ============================================================
function correctTilt(eyeX, eyeY, lms) {
    const lo=lms[L_EYE_OUTER],li=lms[L_EYE_INNER];
    const ro=lms[R_EYE_OUTER],ri=lms[R_EYE_INNER];
    if(!lo||!li||!ro||!ri) return {x:eyeX, y:eyeY};
    const angle=Math.atan2(
        (ro.y+ri.y)/2-(lo.y+li.y)/2,
        (ro.x+ri.x)/2-(lo.x+li.x)/2
    );
    if(Math.abs(angle)<0.052) return {x:eyeX, y:eyeY};
    const cx=(lo.x+li.x+ro.x+ri.x)/4, cy=(lo.y+li.y+ro.y+ri.y)/4;
    const dx=eyeX-cx, dy=eyeY-cy;
    const cos=Math.cos(-angle), sin=Math.sin(-angle);
    return {x:cx+dx*cos-dy*sin, y:cy+dx*sin+dy*cos};
}

// ============================================================
//  ② 顔位置補正
// ============================================================
function getFaceCenter(lms) {
    const pts=[1,10,152,234,454].map(i=>lms[i]).filter(Boolean);
    if(!pts.length) return null;
    return {x:pts.reduce((s,p)=>s+p.x,0)/pts.length, y:pts.reduce((s,p)=>s+p.y,0)/pts.length};
}

// ============================================================
//  ④ オンライン学習
// ============================================================
const MAX_ONLINE_PTS=20;
function addOnlineSample(ex,ey,sx,sy){
    onlineData.push({eyeX:ex,eyeY:ey,screenX:sx,screenY:sy});
    if(onlineData.length>MAX_ONLINE_PTS) onlineData.shift();
    const combined=[...calibData,...onlineData,...onlineData];
    const nx=fitLinear(combined,"screenX"), ny=fitLinear(combined,"screenY");
    if(nx&&ny){regX=nx;regY=ny;}
}

// ============================================================
//  ③ 滞在分布
// ============================================================
function getDwellCenter(){
    const now=performance.now();
    gazeHistory=gazeHistory.filter(p=>now-p.t<DWELL_WINDOW_MS);
    if(gazeHistory.length<DWELL_MIN_PTS) return null;
    return {
        x:gazeHistory.reduce((s,p)=>s+p.x,0)/gazeHistory.length,
        y:gazeHistory.reduce((s,p)=>s+p.y,0)/gazeHistory.length,
    };
}

// ============================================================
//  キャリブレーション
// ============================================================
function showCalibDot(idx){
    const area=document.getElementById("calib-area");
    area.querySelectorAll(".cdot").forEach(d=>d.remove());
    document.getElementById("calib-sample-bar").style.width="0%";
    if(idx>=CALIB_PTS.length){
        regX=fitLinear(calibData,"screenX");
        regY=fitLinear(calibData,"screenY");
        calibDone=true;
        area.style.display="none";
        startGame();
        return;
    }
    const [px,py]=CALIB_PTS[idx];
    const sx=window.innerWidth*px/100, sy=window.innerHeight*py/100;
    const dot=document.createElement("div");
    dot.className="cdot";
    dot.style.left=`${px}%`; dot.style.top=`${py}%`;
    dot.innerHTML=`<div class="cdot-inner">👁️</div>`;
    area.appendChild(dot);
    document.getElementById("calib-prog").textContent=`${idx+1} / ${CALIB_PTS.length}`;
    calibBuf=[]; calibCollecting=true;
    let registered=false;
    const onTap=(e)=>{
        e.preventDefault();
        if(registered||calibBuf.length<MIN_SAMPLES) return;
        registered=true; finishDot(dot,sx,sy);
    };
    dot.addEventListener("pointerdown",onTap);
    area.addEventListener("pointerdown",onTap);
}

function finishDot(dot,sx,sy){
    calibCollecting=false;
    const area=document.getElementById("calib-area");
    const newArea=area.cloneNode(true);
    area.parentNode.replaceChild(newArea,area);
    const nd=newArea.querySelector(".cdot");
    if(nd) nd.classList.add("done");
    if(calibBuf.length>=MIN_SAMPLES){
        const ex=calibBuf.reduce((s,d)=>s+d.x,0)/calibBuf.length;
        const ey=calibBuf.reduce((s,d)=>s+d.y,0)/calibBuf.length;
        calibData.push({eyeX:ex,eyeY:ey,screenX:sx,screenY:sy});
    }
    setTimeout(()=>{calibIdx++;showCalibDot(calibIdx);},450);
}

// ============================================================
//  ゲームロジック
// ============================================================
function hitCard(x,y){
    for(let i=0;i<2;i++){
        const r=document.getElementById(`c${i}`).getBoundingClientRect();
        if(x>=r.left-MARGIN_PX&&x<=r.right+MARGIN_PX&&
           y>=r.top-MARGIN_PX &&y<=r.bottom+MARGIN_PX) return i;
    }
    return -1;
}

function onGaze(x,y){
    gazeX+=(x-gazeX)*SMOOTH_K;
    gazeY+=(y-gazeY)*SMOOTH_K;
    cursor.style.left=`${gazeX}px`;
    cursor.style.top =`${gazeY}px`;
    gazeHistory.push({x:gazeX,y:gazeY,t:performance.now()});

    // ③ 滞在分布と瞬間座標の両方でヒット判定
    const instSel = hitCard(gazeX,gazeY);
    const dwell   = getDwellCenter();
    const dwellSel = dwell ? hitCard(dwell.x,dwell.y) : -1;
    const sel = instSel !== -1 ? instSel : dwellSel;

    if(sel!==curSel){
        if(curSel!==-1){
            document.getElementById(`c${curSel}`).classList.remove("gazing");
            document.getElementById(`d${curSel}`).style.width="0%";
        }
        curSel=sel; selStart=performance.now();
        if(curSel!==-1) document.getElementById(`c${curSel}`).classList.add("gazing");
    }
    if(curSel!==-1){
        const prog=Math.min((performance.now()-selStart)/DWELL_MS*100,100);
        document.getElementById(`d${curSel}`).style.width=`${prog}%`;
        if(prog>=100) decide(curSel);
    }
}

function decide(idx){
    const now=performance.now();
    if(now-lastDecide<COOLDOWN_MS) return;
    lastDecide=now;
    const card=document.getElementById(`c${idx}`);
    if(card.classList.contains("selected-card")) return;
    document.getElementById(`d${idx}`).style.width="0%";
    selStart=now+COOLDOWN_MS;
    card.classList.add("selected-card");
    speakForCard(idx);
    // オンライン学習
    if(currentEyeX!==null&&calibDone) addOnlineSample(currentEyeX,currentEyeY,gazeX,gazeY);
    document.getElementById("status").textContent=VOICES[idx].status;
    setTimeout(()=>{
        card.classList.remove("selected-card");
        document.getElementById("status").textContent="だれをみてる？👀";
    },2500);
}

function startGame(){
    cursor.style.display="block";
    gameReady=true;
    document.getElementById("game").classList.add("active");
    document.getElementById("btn-reset").style.display="block";
    document.getElementById("status").textContent="だれをみてる？👀";
}

// ============================================================
//  検出ループ
// ============================================================
function detect(){
    if(video.readyState<2||video.currentTime===lastVideoTime){requestAnimationFrame(detect);return;}
    lastVideoTime=video.currentTime;
    const results=landmarker.detectForVideo(video,performance.now());
    if(results.faceLandmarks&&results.faceLandmarks.length>0){
        const lms=results.faceLandmarks[0];
        const L=lms[L_IRIS],R=lms[R_IRIS];
        if(L&&R){
            let eyeX=(L.x+R.x)/2, eyeY=(L.y+R.y)/2;
            // ④ 傾き補正
            const c=correctTilt(eyeX,eyeY,lms);
            eyeX=c.x; eyeY=c.y;
            currentEyeX=eyeX; currentEyeY=eyeY;

            if(calibCollecting){
                calibBuf.push({x:eyeX,y:eyeY});
                // キャリブ中に顔中心記録
                const fc=getFaceCenter(lms);
                if(fc){
                    if(!calibFaceCenterX){calibFaceCenterX=fc.x;calibFaceCenterY=fc.y;}
                    else{calibFaceCenterX=calibFaceCenterX*0.98+fc.x*0.02;calibFaceCenterY=calibFaceCenterY*0.98+fc.y*0.02;}
                }
                const pct=Math.min(calibBuf.length/MAX_SAMPLES*100,100);
                const bar=document.getElementById("calib-sample-bar");
                if(bar) bar.style.width=`${pct}%`;
            } else if(calibDone&&gameReady){
                const pred=predictGaze(eyeX,eyeY);
                let px=pred?pred.x:eyeX*window.innerWidth;
                let py=pred?pred.y:eyeY*window.innerHeight;
                // ② 顔位置補正
                if(calibFaceCenterX!==null){
                    const fc=getFaceCenter(lms);
                    if(fc){
                        px-=(fc.x-calibFaceCenterX)*window.innerWidth*3.0;
                        py-=(fc.y-calibFaceCenterY)*window.innerHeight*3.0;
                    }
                }
                onGaze(px,py);
            }
        }
    }
    requestAnimationFrame(detect);
}

// ============================================================
//  リセット
// ============================================================
document.getElementById("btn-reset").addEventListener("click",()=>{
    gameReady=false;
    calibIdx=0;calibData=[];calibBuf=[];calibCollecting=false;calibDone=false;
    regX=null;regY=null;onlineData=[];
    calibFaceCenterX=null;calibFaceCenterY=null;
    currentEyeX=null;currentEyeY=null;gazeHistory=[];
    document.getElementById("game").classList.remove("active");
    cursor.style.display="none";
    document.getElementById("btn-reset").style.display="none";
    document.getElementById("calib-area").style.display="none";
    document.getElementById("status").textContent="";
    for(let i=0;i<2;i++){
        document.getElementById(`c${i}`).classList.remove("gazing","selected-card");
        document.getElementById(`d${i}`).style.width="0%";
    }
    showScreen("s-tap");
});

// ============================================================
//  フロー
// ============================================================
document.getElementById("btn-tap").addEventListener("pointerdown",()=>{
    initSpeech();
    showScreen("s-layout");
});
document.getElementById("btn-vertical").addEventListener("pointerdown",()=>{
    document.getElementById("game").className="vertical";
    startLoading();
});
document.getElementById("btn-horizontal").addEventListener("pointerdown",()=>{
    document.getElementById("game").className="horizontal";
    startLoading();
});

async function startLoading(){
    showScreen("s-loading");
    try{
        document.getElementById("load-msg").textContent="カメラを起動中...";
        const stream=await navigator.mediaDevices.getUserMedia({
            video:{facingMode:"user",width:{ideal:640},height:{ideal:480}}
        });
        video.srcObject=stream;
        await new Promise(r=>{video.onloadeddata=r;});
        document.getElementById("load-msg").textContent="AIモデルを読み込み中...";
        const vision=await FilesetResolver.forVisionTasks(
            "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
        );
        landmarker=await FaceLandmarker.createFromOptions(vision,{
            baseOptions:{
                modelAssetPath:"https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
                delegate:"GPU"
            },
            outputFaceBlendshapes:false,
            runningMode:"VIDEO",
            numFaces:1
        });
        showScreen(null);
        document.getElementById("calib-area").style.display="block";
        showCalibDot(0);
        detect();
    } catch(e){
        document.getElementById("err-title").textContent=
            e.name==="NotAllowedError"?"カメラの許可が必要です":"読み込みに失敗しました";
        document.getElementById("err-msg").textContent=e.message||String(e);
        showScreen("s-error");
    }
}
</script>
