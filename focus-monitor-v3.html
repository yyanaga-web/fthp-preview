<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>集中モニター ⭐</title>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #FFF8F0;
  --card: #FFFFFF;
  --text: #2D2D2D;
  --muted: #9A9A9A;
  --good: #4CAF82;
  --warn: #F5A623;
  --bad: #E85D5D;
  --accent: #5B8DEF;
  --purple: #9B6FE8;
  --border: #F0EBE3;
  --shadow: rgba(0,0,0,0.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'M PLUS Rounded 1c', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}
/* Cute dots background */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background-image: radial-gradient(circle, #E8D5C4 1.5px, transparent 1.5px);
  background-size: 28px 28px;
  opacity: 0.5;
  pointer-events: none;
}
.app {
  position: relative; z-index: 1;
  max-width: 480px;
  margin: 0 auto;
  padding: 20px 16px 60px;
}

/* Header */
.header {
  text-align: center;
  margin-bottom: 20px;
}
.header-inner {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: white;
  border-radius: 50px;
  padding: 10px 22px;
  box-shadow: 0 4px 20px var(--shadow);
  border: 2px solid var(--border);
}
.h-icon { font-size: 1.6rem; animation: spin-slow 8s linear infinite; }
@keyframes spin-slow { to { transform: rotate(360deg); } }
.h-title { font-size: 1.1rem; font-weight: 900; color: var(--text); }
.h-title em { color: var(--accent); font-style: normal; }

/* Score card - big and central */
.score-card {
  background: white;
  border-radius: 28px;
  padding: 24px 20px 20px;
  box-shadow: 0 8px 32px var(--shadow);
  border: 2px solid var(--border);
  margin-bottom: 14px;
  text-align: center;
  transition: border-color 0.4s;
}
.score-card.ok   { border-color: var(--good); }
.score-card.warn { border-color: var(--warn); }
.score-card.bad  { border-color: var(--bad); }

.score-face {
  font-size: 4rem;
  line-height: 1;
  margin-bottom: 6px;
  display: block;
  transition: all 0.3s;
}
.score-label {
  font-size: 1.15rem;
  font-weight: 900;
  margin-bottom: 4px;
  color: var(--text);
  min-height: 1.4em;
}
.score-sub {
  font-size: 0.8rem;
  color: var(--muted);
  margin-bottom: 14px;
  min-height: 1.2em;
}

/* Gauge bar */
.gauge-wrap {
  background: var(--border);
  border-radius: 20px;
  height: 18px;
  overflow: hidden;
  position: relative;
}
.gauge-fill {
  height: 100%;
  border-radius: 20px;
  transition: width 0.6s cubic-bezier(.34,1.56,.64,1), background 0.4s;
  background: var(--good);
  position: relative;
}
.gauge-fill::after {
  content: '';
  position: absolute;
  right: 0; top: 0; bottom: 0;
  width: 6px;
  background: rgba(255,255,255,0.5);
  border-radius: 0 20px 20px 0;
}
.gauge-labels {
  display: flex;
  justify-content: space-between;
  font-size: 0.65rem;
  color: var(--muted);
  margin-top: 4px;
  padding: 0 2px;
}

/* Camera */
.camera-card {
  background: #1a1a2e;
  border-radius: 24px;
  overflow: hidden;
  position: relative;
  aspect-ratio: 4/3;
  margin-bottom: 14px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.2);
  border: 3px solid white;
}
#videoEl {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  transform: scaleX(-1);
}
#overlayCanvas {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  transform: scaleX(-1);
  pointer-events: none;
}
.cam-placeholder {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 10px; color: rgba(255,255,255,0.4);
}
.cam-ph-icon { font-size: 3.5rem; }
.cam-ph-text { font-size: 0.85rem; }

/* Detection badge */
.detect-badge {
  position: absolute;
  bottom: 10px; left: 10px; right: 10px;
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(10px);
  border-radius: 14px;
  padding: 8px 12px;
  display: flex; align-items: center; gap: 8px;
  border: 1px solid rgba(255,255,255,0.15);
}
.detect-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: #666; flex-shrink: 0;
  transition: background 0.3s;
}
.detect-dot.live { background: var(--good); animation: blink 1.2s infinite; box-shadow: 0 0 6px var(--good); }
.detect-dot.warn { background: var(--warn); }
.detect-dot.bad  { background: var(--bad); animation: blink 0.6s infinite; box-shadow: 0 0 6px var(--bad); }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
.detect-text { font-size: 0.75rem; color: white; flex: 1; }
.detect-fps  { font-size: 0.65rem; color: rgba(255,255,255,0.4); }

/* Detail cards row */
.detail-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 14px;
}
.detail-card {
  background: white;
  border-radius: 20px;
  padding: 14px 14px 12px;
  box-shadow: 0 4px 16px var(--shadow);
  border: 2px solid var(--border);
  transition: border-color 0.3s;
}
.detail-card.ok   { border-color: rgba(76,175,130,0.4); }
.detail-card.warn { border-color: rgba(245,166,35,0.4); }
.detail-card.bad  { border-color: rgba(232,93,93,0.4); }
.dc-header { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
.dc-icon { font-size: 1.1rem; }
.dc-name { font-size: 0.75rem; font-weight: 700; color: var(--muted); }
.dc-val {
  font-size: 1.6rem;
  font-weight: 900;
  line-height: 1;
  margin-bottom: 4px;
  color: var(--text);
  transition: color 0.3s;
}
.dc-mini-bar { height: 5px; background: var(--border); border-radius: 10px; overflow: hidden; }
.dc-mini-fill { height: 100%; border-radius: 10px; transition: width 0.5s ease, background 0.3s; }

/* Stats row */
.stats-row {
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: 10px;
  margin-bottom: 14px;
}
.stat-card {
  background: white;
  border-radius: 18px;
  padding: 12px 8px;
  text-align: center;
  box-shadow: 0 4px 16px var(--shadow);
  border: 2px solid var(--border);
}
.stat-icon { font-size: 1rem; }
.stat-num { font-size: 1.3rem; font-weight: 900; margin: 2px 0 1px; }
.stat-lbl { font-size: 0.65rem; color: var(--muted); }

/* Settings */
.settings-card {
  background: white;
  border-radius: 20px;
  padding: 16px;
  box-shadow: 0 4px 16px var(--shadow);
  border: 2px solid var(--border);
  margin-bottom: 14px;
}
.settings-title {
  font-size: 0.8rem; font-weight: 900; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 12px;
}
.setting-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.setting-row:last-child { margin-bottom: 0; }
.setting-lbl { flex: 1; font-size: 0.82rem; color: var(--text); }
.setting-row input[type=range] { width: 90px; accent-color: var(--accent); }
.setting-val { font-weight: 900; font-size: 0.82rem; min-width: 36px; text-align: right; color: var(--accent); }

/* Button */
.btn-main {
  display: block; width: 100%; padding: 16px;
  border: none; border-radius: 20px;
  font-family: inherit; font-size: 1.05rem; font-weight: 900;
  cursor: pointer; transition: all 0.2s; margin-bottom: 14px;
  letter-spacing: 0.02em;
}
.btn-main.start {
  background: linear-gradient(135deg, #4CAF82, #2E9E6A);
  color: white;
  box-shadow: 0 6px 24px rgba(76,175,130,0.4);
}
.btn-main.stop {
  background: linear-gradient(135deg, #E85D5D, #D44);
  color: white;
  box-shadow: 0 6px 24px rgba(232,93,93,0.35);
}
.btn-main:hover { transform: translateY(-2px); filter: brightness(1.05); }
.btn-main:active { transform: translateY(1px); }
.btn-main:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

/* Alert popup */
.alert-pop {
  position: fixed;
  bottom: -220px; left: 50%; transform: translateX(-50%);
  width: min(360px, 92vw);
  background: white;
  border-radius: 28px;
  border: 3px solid var(--bad);
  padding: 22px 24px;
  text-align: center;
  box-shadow: 0 24px 60px rgba(0,0,0,0.18);
  z-index: 200;
  transition: bottom 0.5s cubic-bezier(0.34,1.56,0.64,1);
}
.alert-pop.show { bottom: 24px; }
.alert-pop-emoji { font-size: 3.5rem; }
.alert-pop-title { font-size: 1.3rem; font-weight: 900; color: var(--bad); margin: 8px 0 6px; }
.alert-pop-reason { font-size: 0.82rem; color: var(--muted); margin-bottom: 10px; }
.alert-pop-msg { font-size: 0.95rem; font-weight: 700; color: var(--text); }

/* Log */
.log-card {
  background: white;
  border-radius: 20px;
  padding: 14px 16px;
  box-shadow: 0 4px 16px var(--shadow);
  border: 2px solid var(--border);
  max-height: 160px; overflow-y: auto;
}
.log-title { font-size: 0.75rem; font-weight: 900; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
.log-item { display: flex; gap: 8px; padding: 4px 0; border-bottom: 1px solid var(--border); font-size: 0.78rem; }
.log-item:last-child { border: none; }
.log-time { color: var(--muted); font-size: 0.7rem; white-space: nowrap; }
.log-txt  { flex: 1; color: var(--text); }
.log-item.is-alert .log-txt { color: var(--bad); font-weight: 700; }
.log-item.is-good  .log-txt { color: var(--good); font-weight: 700; }

/* Confetti */
.confetti-wrap { position: fixed; inset: 0; pointer-events: none; z-index: 999; overflow: hidden; }
.confetti-p { position: absolute; border-radius: 2px; animation: fall linear forwards; }
@keyframes fall { 0%{transform:translateY(-20px) rotate(0deg);opacity:1} 100%{transform:translateY(105vh) rotate(720deg);opacity:0} }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-inner">
      <span class="h-icon">⭐</span>
      <span class="h-title">しゅうちゅう<em>モニター</em></span>
    </div>
  </div>

  <!-- Score card -->
  <div class="score-card idle" id="scoreCard">
    <span class="score-face" id="scoreFace">😴</span>
    <div class="score-label" id="scoreLabel">カメラをスタートしよう！</div>
    <div class="score-sub" id="scoreSub">下のボタンを押してね</div>
    <div class="gauge-wrap">
      <div class="gauge-fill" id="gaugeFill" style="width:0%"></div>
    </div>
    <div class="gauge-labels"><span>集中切れ</span><span>集中中 ✨</span></div>
  </div>

  <!-- Camera -->
  <div class="camera-card">
    <video id="videoEl" autoplay playsinline muted></video>
    <canvas id="overlayCanvas"></canvas>
    <div class="cam-placeholder" id="camPlaceholder">
      <div class="cam-ph-icon">📷</div>
      <div class="cam-ph-text">カメラをスタートしてね</div>
    </div>
    <div class="detect-badge">
      <div class="detect-dot" id="detectDot"></div>
      <div class="detect-text" id="detectText">待機中</div>
      <div class="detect-fps" id="detectFps"></div>
    </div>
  </div>

  <!-- Detail cards -->
  <div class="detail-row">
    <div class="detail-card" id="dc-gaze">
      <div class="dc-header"><span class="dc-icon">👀</span><span class="dc-name">視線</span></div>
      <div class="dc-val" id="dv-gaze">--</div>
      <div class="dc-mini-bar"><div class="dc-mini-fill" id="db-gaze" style="width:0%"></div></div>
    </div>
    <div class="detail-card" id="dc-posture">
      <div class="dc-header"><span class="dc-icon">🪑</span><span class="dc-name">姿勢</span></div>
      <div class="dc-val" id="dv-posture">--</div>
      <div class="dc-mini-bar"><div class="dc-mini-fill" id="db-posture" style="width:0%"></div></div>
    </div>
    <div class="detail-card" id="dc-eyes">
      <div class="dc-header"><span class="dc-icon">😶</span><span class="dc-name">目の開き</span></div>
      <div class="dc-val" id="dv-eyes">--</div>
      <div class="dc-mini-bar"><div class="dc-mini-fill" id="db-eyes" style="width:0%"></div></div>
    </div>
    <div class="detail-card" id="dc-face">
      <div class="dc-header"><span class="dc-icon">🔍</span><span class="dc-name">顔の検出</span></div>
      <div class="dc-val" id="dv-face">--</div>
      <div class="dc-mini-bar"><div class="dc-mini-fill" id="db-face" style="width:0%"></div></div>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-icon">⏱️</div>
      <div class="stat-num" id="statFocusTime">0:00</div>
      <div class="stat-lbl">集中時間</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">🔔</div>
      <div class="stat-num" id="statAlerts">0</div>
      <div class="stat-lbl">声がけ</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">📊</div>
      <div class="stat-num" id="statRate">--</div>
      <div class="stat-lbl">集中率</div>
    </div>
  </div>

  <!-- Settings -->
  <div class="settings-card">
    <div class="settings-title">⚙ せってい</div>
    <div class="setting-row">
      <span class="setting-lbl">🔔 声がけまでの時間</span>
      <input type="range" id="threshSlider" min="3" max="20" value="8" step="1">
      <span class="setting-val" id="threshVal">8秒</span>
    </div>
    <div class="setting-row">
      <span class="setting-lbl">🔊 音量</span>
      <input type="range" id="volSlider" min="0" max="1" value="0.8" step="0.1">
      <span class="setting-val" id="volVal">80%</span>
    </div>
  </div>

  <button class="btn-main start" id="mainBtn">📷 カメラをスタート</button>

  <div class="log-card">
    <div class="log-title">📋 きろく</div>
    <div id="logList"></div>
  </div>
</div>

<div class="alert-pop" id="alertPop">
  <div class="alert-pop-emoji" id="apEmoji">😮</div>
  <div class="alert-pop-title" id="apTitle">集中しよう！</div>
  <div class="alert-pop-reason" id="apReason"></div>
  <div class="alert-pop-msg" id="apMsg">もうひとふんばりできるよ！</div>
</div>

<div class="confetti-wrap" id="confettiWrap"></div>

<!-- MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4.1633559619/face_mesh.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1632667962/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.3.1620248257/drawing_utils.js" crossorigin="anonymous"></script>

<script>
// ===== STATE =====
const S = {
  running: false,
  thresh: 8,
  volume: 0.8,
  focusSec: 0,
  totalSec: 0,
  alertCount: 0,
  alertCooldown: false,
  unfocusedSec: 0,
  focusedSec: 0, // streak for celebration
  timer: null,
  lastFocused: true,
  faceVisible: false,
};

const ALERTS = [
  { emoji:'😊', title:'集中しよう！', msg:'勉強がんばれ！きみならできる！' },
  { emoji:'💪', title:'もうひとふんばり！', msg:'あとすこしで終わるよ！' },
  { emoji:'👀', title:'テキストを見てみよう！', msg:'目線を本に戻してね！' },
  { emoji:'🌟', title:'集中モード、オン！', msg:'深呼吸して集中しよう！' },
  { emoji:'🚀', title:'ファイト！', msg:'集中パワーを出して！' },
  { emoji:'📚', title:'本を見てね！', msg:'もうすこしがんばれ！' },
];

// ===== ELEMENTS =====
const videoEl   = document.getElementById('videoEl');
const canvas    = document.getElementById('overlayCanvas');
const ctx       = canvas.getContext('2d');
const placeholder = document.getElementById('camPlaceholder');
const scoreCard = document.getElementById('scoreCard');
const scoreFace = document.getElementById('scoreFace');
const scoreLabel= document.getElementById('scoreLabel');
const scoreSub  = document.getElementById('scoreSub');
const gaugeFill = document.getElementById('gaugeFill');
const detectDot = document.getElementById('detectDot');
const detectText= document.getElementById('detectText');
const detectFps = document.getElementById('detectFps');
const alertPop  = document.getElementById('alertPop');
const mainBtn   = document.getElementById('mainBtn');
const logList   = document.getElementById('logList');

// ===== SETTINGS =====
document.getElementById('threshSlider').addEventListener('input', e => {
  S.thresh = +e.target.value;
  document.getElementById('threshVal').textContent = e.target.value + '秒';
});
document.getElementById('volSlider').addEventListener('input', e => {
  S.volume = +e.target.value;
  document.getElementById('volVal').textContent = Math.round(S.volume*100) + '%';
});

// ===== MEDIAPIPE LANDMARKS =====
// Key indices
const NOSE_TIP = 1, FOREHEAD = 10, CHIN = 152;
const LEFT_EAR = 234, RIGHT_EAR = 454;
const L_EYE_TOP = 159, L_EYE_BOT = 145;
const R_EYE_TOP = 386, R_EYE_BOT = 374;
const L_IRIS_CENTER = 468, R_IRIS_CENTER = 473; // refined landmarks
// Mouth open
const UPPER_LIP = 13, LOWER_LIP = 14;

// ===== SMOOTHING =====
const history = [];
const HIST = 10;

function smooth(val) {
  return history.reduce((s,h) => s + (h.focused?1:0), 0) / history.length;
}

// ===== ANALYSIS =====
function analyze(lm) {
  const nose = lm[NOSE_TIP];
  const forehead = lm[FOREHEAD];
  const chin = lm[CHIN];
  const lEar = lm[LEFT_EAR];
  const rEar = lm[RIGHT_EAR];

  // --- HEAD PITCH (up/down) ---
  const faceH = chin.y - forehead.y;
  const nosePosRatio = faceH > 0.001 ? (nose.y - forehead.y) / faceH : 0.55;
  // Normal ~0.52. Looking up: < 0.43. Looking way down: > 0.68
  const lookingUp   = nosePosRatio < 0.43;
  const lookingDown = nosePosRatio > 0.69;

  // --- HEAD YAW (left/right turn) ---
  const faceW = rEar.x - lEar.x;
  const noseCx = (lEar.x + rEar.x) / 2;
  const yaw = faceW > 0.001 ? Math.abs((nose.x - noseCx) / faceW) : 0;
  const lookingSide = yaw > 0.15;

  // --- HEAD ROLL (tilt/cheek rest) ---
  const roll = Math.abs(lEar.y - rEar.y) / (faceW || 0.001);
  const headTilted = roll > 0.18;

  // --- EYE OPENNESS ---
  const lOpen = Math.abs(lm[L_EYE_TOP].y - lm[L_EYE_BOT].y);
  const rOpen = Math.abs(lm[R_EYE_TOP].y - lm[R_EYE_BOT].y);
  const eyeOpen = (lOpen + rOpen) / 2;
  // Normal ~0.012-0.020. Closed/sleepy: < 0.007
  const eyesClosed = eyeOpen < 0.0068;
  const eyesDroopy = eyeOpen < 0.010 && !eyesClosed;

  // --- IRIS GAZE (if refined landmarks available) ---
  let gazeOff = false;
  if (lm.length > 468) {
    const lIris = lm[L_IRIS_CENTER];
    const rIris = lm[R_IRIS_CENTER];
    // Iris relative to eye corners
    const lCornerL = lm[33], lCornerR = lm[133];
    const rCornerL = lm[362], rCornerR = lm[263];
    const lGaze = lCornerR.x > lCornerL.x ? (lIris.x - lCornerL.x)/(lCornerR.x - lCornerL.x) : 0.5;
    const rGaze = rCornerR.x > rCornerL.x ? (rIris.x - rCornerL.x)/(rCornerR.x - rCornerL.x) : 0.5;
    const avgGaze = (lGaze + rGaze) / 2;
    gazeOff = avgGaze < 0.2 || avgGaze > 0.82;
  }

  // --- MOUTH (yawn detection) ---
  const mouthOpen = Math.abs(lm[UPPER_LIP].y - lm[LOWER_LIP].y);
  const yawning = mouthOpen > 0.045;

  // --- SCORES (0-100) ---
  let gazeScore = 100;
  if (lookingUp)   gazeScore -= 55;
  if (lookingSide) gazeScore -= 40;
  if (gazeOff)     gazeScore -= 25;
  gazeScore = Math.max(0, gazeScore);

  let postureScore = 100;
  if (lookingDown) postureScore -= 45;
  if (headTilted)  postureScore -= 50;
  postureScore = Math.max(0, postureScore);

  let eyeScore = 100;
  if (eyesClosed) eyeScore = 10;
  else if (eyesDroopy) eyeScore = 50;
  if (yawning) eyeScore -= 30;
  eyeScore = Math.max(0, eyeScore);

  const faceScore = 100; // face is visible

  const overall = Math.round((gazeScore * 0.35 + postureScore * 0.30 + eyeScore * 0.35));

  // Reasons
  const reasons = [];
  if (lookingUp)    reasons.push('上を向いてるよ 👆');
  if (lookingSide)  reasons.push('横を向いてるよ 👉');
  if (lookingDown)  reasons.push('うつむいてるよ 👇');
  if (headTilted)   reasons.push('頭が傾いてるよ 😪');
  if (eyesClosed)   reasons.push('目が閉じてるよ 😴');
  else if(eyesDroopy) reasons.push('目が半開きだよ 🥱');
  if (yawning)      reasons.push('あくびしてる？ 🥱');

  return { gazeScore, postureScore, eyeScore, faceScore, overall, reasons, focused: overall >= 60 };
}

// ===== DRAW OVERLAY =====
function drawOverlay(lm, result) {
  canvas.width  = videoEl.videoWidth  || canvas.clientWidth;
  canvas.height = videoEl.videoHeight || canvas.clientHeight;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Draw eye contours
  const col = result.focused ? 'rgba(76,175,130,0.5)' : 'rgba(232,93,93,0.5)';
  drawConnectors(ctx, lm, FACEMESH_LEFT_EYE,  { color: col, lineWidth: 1.5 });
  drawConnectors(ctx, lm, FACEMESH_RIGHT_EYE, { color: col, lineWidth: 1.5 });

  // Draw iris if available
  if (lm.length > 468) {
    const drawIris = (idx) => {
      const p = lm[idx];
      const x = p.x * canvas.width;
      const y = p.y * canvas.height;
      ctx.beginPath();
      ctx.arc(x, y, 3, 0, Math.PI*2);
      ctx.fillStyle = result.focused ? 'rgba(76,175,130,0.8)' : 'rgba(232,93,93,0.8)';
      ctx.fill();
    };
    drawIris(L_IRIS_CENTER);
    drawIris(R_IRIS_CENTER);
  }

  // Nose dot
  const nx = lm[NOSE_TIP].x * canvas.width;
  const ny = lm[NOSE_TIP].y * canvas.height;
  ctx.beginPath();
  ctx.arc(nx, ny, 3, 0, Math.PI*2);
  ctx.fillStyle = result.focused ? 'rgba(76,175,130,0.6)' : 'rgba(245,166,35,0.6)';
  ctx.fill();
}

// ===== UI UPDATE =====
let lastResultCache = null;

function updateDetailCard(id, score, label) {
  const card = document.getElementById('dc-' + id);
  const val  = document.getElementById('dv-' + id);
  const bar  = document.getElementById('db-' + id);
  const cls  = score >= 70 ? 'ok' : score >= 45 ? 'warn' : 'bad';
  const col  = score >= 70 ? 'var(--good)' : score >= 45 ? 'var(--warn)' : 'var(--bad)';
  card.className = 'detail-card ' + cls;
  val.textContent  = label;
  val.style.color  = col;
  bar.style.width  = score + '%';
  bar.style.background = col;
}

function updateUI(result) {
  lastResultCache = result;
  const f = result.focused;

  // Score card
  scoreCard.className = 'score-card ' + (f ? 'ok' : result.overall >= 45 ? 'warn' : 'bad');
  scoreFace.textContent = f ? '😊' : result.overall >= 45 ? '😕' : '😵';
  scoreLabel.textContent = f ? '集中してるね！すごい！' : (result.reasons[0] || '集中が切れてるかも？');
  scoreSub.textContent = f ? '✨ このちょうしでがんばれ！' : result.reasons.slice(1).join(' ') || '';

  // Gauge
  gaugeFill.style.width = result.overall + '%';
  gaugeFill.style.background = result.overall >= 70 ? 'var(--good)' : result.overall >= 45 ? 'var(--warn)' : 'var(--bad)';

  // Detail cards
  const gazeLabel    = result.gazeScore >= 70 ? '◎ よい' : result.gazeScore >= 45 ? '△ 注意' : '× NG';
  const postureLabel = result.postureScore >= 70 ? '◎ よい' : result.postureScore >= 45 ? '△ 注意' : '× NG';
  const eyeLabel     = result.eyeScore >= 70 ? '◎ よい' : result.eyeScore >= 45 ? '△ 眠い' : '× 閉じ';
  updateDetailCard('gaze',    result.gazeScore,    gazeLabel);
  updateDetailCard('posture', result.postureScore, postureLabel);
  updateDetailCard('eyes',    result.eyeScore,     eyeLabel);
  updateDetailCard('face',    100, '◎ 検出中');

  // Detect badge
  detectDot.className = 'detect-dot ' + (f ? 'live' : 'bad');
  detectText.textContent = f ? '集中しているよ！' : result.reasons[0] || 'ちょっと集中が切れてる';
}

function updateNoFace() {
  scoreCard.className = 'score-card warn';
  scoreFace.textContent = '🔍';
  scoreLabel.textContent = '顔が見えないよ…';
  scoreSub.textContent = 'カメラの前に座ってね';
  gaugeFill.style.width = '0%';
  detectDot.className = 'detect-dot warn';
  detectText.textContent = '顔を検出中…';
  updateDetailCard('face', 0, '× 未検出');
  ['gaze','posture','eyes'].forEach(k => {
    document.getElementById('dv-'+k).textContent = '--';
    document.getElementById('db-'+k).style.width = '0%';
    document.getElementById('dc-'+k).className = 'detail-card';
  });
}

// ===== MEDIAPIPE =====
let faceMesh = null, mpCam = null;
let frameCount = 0, lastFpsTime = Date.now();

function onResults(results) {
  if (!S.running) return;

  // FPS counter
  frameCount++;
  const now = Date.now();
  if (now - lastFpsTime > 1000) {
    detectFps.textContent = frameCount + ' fps';
    frameCount = 0; lastFpsTime = now;
  }

  placeholder.style.display = 'none';

  if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
    S.faceVisible = true;
    const lm = results.multiFaceLandmarks[0];
    const result = analyze(lm);

    // Rolling history
    history.push({ focused: result.focused });
    if (history.length > HIST) history.shift();

    drawOverlay(lm, result);
    updateUI(result);
    S.lastFocused = result.focused;
  } else {
    S.faceVisible = false;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    updateNoFace();
    S.lastFocused = false;
    history.push({ focused: false });
    if (history.length > HIST) history.shift();
  }
}

function initFaceMesh() {
  faceMesh = new FaceMesh({ locateFile: f =>
    `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4.1633559619/${f}` });
  faceMesh.setOptions({
    maxNumFaces: 1,
    refineLandmarks: true,
    minDetectionConfidence: 0.5,
    minTrackingConfidence: 0.5,
  });
  faceMesh.onResults(onResults);
}

// ===== SECOND TIMER =====
function startTimer() {
  if (S.timer) clearInterval(S.timer);
  S.timer = setInterval(() => {
    if (!S.running) return;
    S.totalSec++;
    if (S.lastFocused && S.faceVisible) {
      S.focusSec++;
      S.focusedSec++;
      S.unfocusedSec = 0;
      if (S.focusedSec === 300) celebrate(); // 5 min streak
    } else {
      S.unfocusedSec++;
      S.focusedSec = 0;
      if (S.unfocusedSec >= S.thresh && !S.alertCooldown) triggerAlert();
    }
    // Stats
    const m = Math.floor(S.focusSec/60), s = S.focusSec%60;
    document.getElementById('statFocusTime').textContent = m+':'+String(s).padStart(2,'0');
    if (S.totalSec > 0)
      document.getElementById('statRate').textContent = Math.round(S.focusSec/S.totalSec*100)+'%';
  }, 1000);
}

// ===== ALERT =====
function triggerAlert() {
  S.alertCooldown = true;
  S.alertCount++;
  document.getElementById('statAlerts').textContent = S.alertCount;
  const a = ALERTS[S.alertCount % ALERTS.length];
  document.getElementById('apEmoji').textContent = a.emoji;
  document.getElementById('apTitle').textContent = a.title;
  document.getElementById('apReason').textContent =
    lastResultCache ? (lastResultCache.reasons.join(' ') || '') : '';
  document.getElementById('apMsg').textContent = a.msg;
  alertPop.classList.add('show');
  speak(a.title + '。' + a.msg);
  addLog(a.emoji + ' ' + a.title + ' — ' + a.msg, true, false);
  setTimeout(() => {
    alertPop.classList.remove('show');
    S.unfocusedSec = 0;
    setTimeout(() => { S.alertCooldown = false; }, S.thresh * 1500);
  }, 3500);
}

// ===== TTS =====
function speak(text) {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'ja-JP'; u.rate = 0.92; u.pitch = 1.1; u.volume = S.volume;
  const v = speechSynthesis.getVoices().find(v => v.lang.startsWith('ja'));
  if (v) u.voice = v;
  speechSynthesis.speak(u);
}

// ===== CELEBRATION =====
function celebrate() {
  const wrap = document.getElementById('confettiWrap');
  const cols = ['#f87171','#fbbf24','#4ade80','#60a5fa','#a78bfa','#fb923c'];
  for (let i = 0; i < 80; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-p';
    const sz = 6 + Math.random()*10;
    el.style.cssText = `left:${Math.random()*100}%;top:-15px;
      background:${cols[~~(Math.random()*cols.length)]};
      width:${sz}px;height:${sz}px;
      animation-duration:${1.5+Math.random()*2.5}s;
      animation-delay:${Math.random()*0.5}s;`;
    wrap.appendChild(el);
    setTimeout(() => el.remove(), 5000);
  }
  speak('すごい！5分間よく集中できたね！さいこう！');
  addLog('🎉 5分間集中達成！すごい！', false, true);
}

// ===== LOG =====
function addLog(text, isAlert=false, isGood=false) {
  const n = new Date();
  const t = n.getHours()+':'+String(n.getMinutes()).padStart(2,'0')+':'+String(n.getSeconds()).padStart(2,'0');
  const d = document.createElement('div');
  d.className = 'log-item' + (isAlert?' is-alert':isGood?' is-good':'');
  d.innerHTML = `<span class="log-time">${t}</span><span class="log-txt">${text}</span>`;
  logList.prepend(d);
  if (logList.children.length > 40) logList.removeChild(logList.lastChild);
}

// ===== START / STOP =====
async function startMonitor() {
  mainBtn.disabled = true; mainBtn.textContent = '起動中…';
  try {
    const stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:640,height:480}});
    videoEl.srcObject = stream;
    await videoEl.play();
    placeholder.style.display = 'none';
  } catch(e) {
    addLog('❌ カメラエラー: ' + e.message);
    mainBtn.disabled = false; mainBtn.textContent = '📷 カメラをスタート';
    mainBtn.className = 'btn-main start';
    return;
  }

  // initialize FaceMesh without awaiting (hangs on mobile)
  if (!faceMesh) initFaceMesh();

  // Start sending frames immediately; faceMesh will process when ready
  let sending = false;
  mpCam = new Camera(videoEl, {
    onFrame: async () => {
      if (!faceMesh || sending) return;
      sending = true;
      try { await faceMesh.send({ image: videoEl }); } catch(e) {}
      sending = false;
    },
    width: 640, height: 480
  });
  mpCam.start();

  S.running = true;
  S.focusSec = 0; S.totalSec = 0; S.alertCount = 0;
  S.unfocusedSec = 0; S.focusedSec = 0;
  S.alertCooldown = false; S.lastFocused = false; S.faceVisible = false;
  history.length = 0;
  document.getElementById('statFocusTime').textContent = '0:00';
  document.getElementById('statAlerts').textContent = '0';
  document.getElementById('statRate').textContent = '--';
  logList.innerHTML = '';

  mainBtn.disabled = false;
  mainBtn.className = 'btn-main stop';
  mainBtn.textContent = '⏹ ストップ';
  detectDot.classList.add('live');
  detectText.textContent = '起動中…';
  addLog('📷 モニタリング開始', false, true);
  startTimer();
}

function stopMonitor() {
  S.running = false;
  if (S.timer) clearInterval(S.timer);
  if (mpCam) { mpCam.stop(); mpCam = null; }
  if (videoEl.srcObject) {
    videoEl.srcObject.getTracks().forEach(t => t.stop());
    videoEl.srcObject = null;
  }
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  placeholder.style.display = 'flex';
  alertPop.classList.remove('show');
  scoreCard.className = 'score-card idle';
  scoreFace.textContent = '😴';
  scoreLabel.textContent = 'おつかれさま！';
  scoreSub.textContent = '集中時間: ' + document.getElementById('statFocusTime').textContent;
  gaugeFill.style.width = '0%';
  detectDot.className = 'detect-dot';
  detectText.textContent = '待機中';
  detectFps.textContent = '';
  mainBtn.className = 'btn-main start';
  mainBtn.textContent = '📷 カメラをスタート';
  addLog('⏹ 終了（集中時間: ' + document.getElementById('statFocusTime').textContent + '）');
  speechSynthesis && speechSynthesis.cancel();
}

mainBtn.addEventListener('click', () => { if (S.running) stopMonitor(); else startMonitor(); });

window.addEventListener('load', () => {
  if (window.speechSynthesis) {
    speechSynthesis.getVoices();
    speechSynthesis.addEventListener('voiceschanged', () => speechSynthesis.getVoices());
  }
});
</script>
