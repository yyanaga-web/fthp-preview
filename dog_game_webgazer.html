<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>わんわんゲーム</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html {
            width: 100%; height: 100%;
            overflow: hidden;
            background: #FFFDE7;
            font-family: Arial, sans-serif;
            user-select: none;
        }

        /* ===== カード ===== */
        #game {
            width: 100vw; height: 100vh;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }
        .card {
            width: 28%; height: 62%;
            background: white;
            border: 8px solid #ddd;
            border-radius: 28px;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            position: relative; overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
            transition: border-color 0.15s, transform 0.15s, background 0.15s;
        }
        .card.gazing {
            border-color: #FF5252;
            transform: scale(1.07);
            background: #FFF3F3;
        }
        .card .emoji { font-size: clamp(52px, 12vw, 88px); line-height: 1; }
        .card .name  {
            margin-top: 12px;
            font-size: clamp(15px, 4vw, 24px);
            font-weight: bold; color: #555;
        }
        /* 視線滞留プログレスバー */
        .dwell {
            position: absolute; bottom: 0; left: 0;
            height: 14px; width: 0%;
            background: linear-gradient(90deg, #4CAF50, #8BC34A);
            border-radius: 0 0 20px 20px;
            transition: width 0.06s linear;
        }
        @keyframes woof {
            0%,100% { transform: scale(1.07); }
            40%     { transform: scale(1.18) rotate(5deg); }
            70%     { transform: scale(1.15) rotate(-4deg); }
        }
        .card.woofing {
            animation: woof 0.28s ease-in-out infinite;
            border-color: #FF5252;
        }

        /* ===== カメラプレビュー ===== */
        #cam-wrap {
            position: fixed; bottom: 12px; right: 12px;
            width: 110px; height: 82px;
            border: 3px solid #333; border-radius: 10px;
            overflow: hidden; background: #000; z-index: 200;
        }
        /* WebGazerのvideo/canvasを小さく収める */
        #cam-wrap video,
        #cam-wrap canvas {
            position: absolute !important;
            width: 110px !important; height: 82px !important;
            top: 0 !important; left: 0 !important;
            object-fit: cover;
        }

        /* 視線カーソル */
        #gaze-cursor {
            position: fixed;
            width: 36px; height: 36px;
            border-radius: 50%;
            background: rgba(255, 82, 82, 0.45);
            border: 3px solid rgba(255, 82, 82, 0.8);
            pointer-events: none;
            z-index: 300;
            transform: translate(-50%, -50%);
            transition: left 0.06s ease, top 0.06s ease;
            display: none;
        }

        /* ===== ステータス ===== */
        #status {
            position: fixed; top: 14px; left: 0; width: 100%;
            text-align: center;
            font-size: clamp(15px, 3.5vw, 22px);
            font-weight: bold; color: #444; z-index: 100;
            text-shadow: 0 1px 4px rgba(255,255,255,0.9);
        }

        /* ===== オーバーレイ共通 ===== */
        .overlay {
            position: fixed; inset: 0;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            gap: 18px; z-index: 500;
            font-size: 20px; font-weight: bold; color: #444;
            padding: 32px; text-align: center;
        }
        #ov-loading { background: #FFFDE7; }
        #ov-calib   { background: rgba(255,253,231,0.97); display: none; }
        #ov-error   { background: #fff3f3; display: none; color: #c00; }

        .spinner {
            width: 52px; height: 52px;
            border: 7px solid #ddd; border-top-color: #FF5252;
            border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .sub { font-size: 14px; color: #888; font-weight: normal; line-height: 1.6; }

        /* キャリブレーション */
        #calib-area {
            position: fixed; inset: 0;
            display: none; z-index: 400;
            background: rgba(255,253,231,0.96);
        }
        .calib-dot {
            position: absolute;
            width: 44px; height: 44px;
            background: #FF5252;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            cursor: pointer;
            box-shadow: 0 0 0 0 rgba(255,82,82,0.5);
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%   { box-shadow: 0 0 0 0 rgba(255,82,82,0.5); }
            70%  { box-shadow: 0 0 0 16px rgba(255,82,82,0); }
            100% { box-shadow: 0 0 0 0 rgba(255,82,82,0); }
        }
        .calib-dot.done { background: #4CAF50; animation: none; }
        #calib-msg {
            position: absolute; bottom: 60px; left: 0; width: 100%;
            text-align: center; font-size: 18px; font-weight: bold; color: #444;
        }
        #calib-progress {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            font-size: 14px; color: #888;
        }

        #err-btn {
            padding: 12px 30px; font-size: 18px;
            background: #FF5252; color: white;
            border: none; border-radius: 14px; cursor: pointer;
        }
    </style>
</head>
<body>

<!-- ローディング -->
<div class="overlay" id="ov-loading">
    <div class="spinner"></div>
    <div>読み込み中...</div>
    <div class="sub">カメラの許可をタップしてください</div>
</div>

<!-- エラー -->
<div class="overlay" id="ov-error">
    <div style="font-size:52px">⚠️</div>
    <div id="err-title">エラーが発生しました</div>
    <div class="sub" id="err-msg"></div>
    <button id="err-btn" onclick="location.reload()">もう一度試す</button>
</div>

<!-- キャリブレーション画面 -->
<div id="calib-area">
    <div id="calib-msg">赤い点を順番に見てください 👁️</div>
    <div id="calib-progress"></div>
</div>

<!-- 視線カーソル -->
<div id="gaze-cursor"></div>

<!-- ステータス -->
<div id="status">読み込み中...</div>

<!-- ゲーム -->
<div id="game">
    <div class="card" id="c0">
        <div class="emoji">🐶</div>
        <div class="name">ポチ</div>
        <div class="dwell" id="d0"></div>
    </div>
    <div class="card" id="c1">
        <div class="emoji">🐕</div>
        <div class="name">コロ</div>
        <div class="dwell" id="d1"></div>
    </div>
    <div class="card" id="c2">
        <div class="emoji">🦮</div>
        <div class="name">タロ</div>
        <div class="dwell" id="d2"></div>
    </div>
</div>

<!-- カメラプレビュー枠（WebGazerのvideo/canvasをここに移動） -->
<div id="cam-wrap"></div>

<!-- WebGazer（unpkg CDNから読み込み） -->
<script src="https://unpkg.com/webgazer@3.0.1/dist/webgazer.js"></script>

<script>
"use strict";

// ============================================================
//  パラメーター（調整ポイント）
// ============================================================
const DWELL_MS    = 1800;  // 視線を留めてから確定するまでの時間(ms)
const COOLDOWN_MS = 2500;  // 確定後のクールダウン(ms)
const SMOOTH_K    = 0.18;  // 視線平滑化（小さいほど滑らか・遅延あり）
const GAZE_MARGIN = 20;    // カード判定の余白(px)

// ============================================================
//  状態
// ============================================================
let gazeX = window.innerWidth  / 2;
let gazeY = window.innerHeight / 2;
let curSel    = -1;
let selStart  = 0;
let lastDecide= 0;
let gameReady = false;

// ============================================================
//  音（Web Audio）
// ============================================================
const ac = new (window.AudioContext || window.webkitAudioContext)();
function bark() {
    if (ac.state === "suspended") ac.resume();
    [[0, 380, 165], [0.22, 320, 135]].forEach(([t, f0, f1]) => {
        const o = ac.createOscillator(), g = ac.createGain();
        o.connect(g); g.connect(ac.destination);
        o.frequency.setValueAtTime(f0, ac.currentTime + t);
        o.frequency.exponentialRampToValueAtTime(f1, ac.currentTime + t + 0.13);
        g.gain.setValueAtTime(0.48, ac.currentTime + t);
        g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + t + 0.15);
        o.start(ac.currentTime + t);
        o.stop(ac.currentTime + t + 0.16);
    });
}

// ============================================================
//  カード当たり判定
// ============================================================
function getCardRects() {
    return [0,1,2].map(i => document.getElementById(`c${i}`).getBoundingClientRect());
}

function hitCard(x, y) {
    const rects = getCardRects();
    for (let i = 0; i < rects.length; i++) {
        const r = rects[i];
        if (x >= r.left - GAZE_MARGIN && x <= r.right  + GAZE_MARGIN &&
            y >= r.top  - GAZE_MARGIN && y <= r.bottom + GAZE_MARGIN) {
            return i;
        }
    }
    return -1;
}

// ============================================================
//  視線ゲームループ（rAFで毎フレーム）
// ============================================================
const cursor = document.getElementById("gaze-cursor");

function gameLoop() {
    if (!gameReady) { requestAnimationFrame(gameLoop); return; }

    // カーソル表示
    cursor.style.left = `${gazeX}px`;
    cursor.style.top  = `${gazeY}px`;

    const sel = hitCard(gazeX, gazeY);

    if (sel !== curSel) {
        // 視線が別カードへ移動
        if (curSel !== -1) {
            document.getElementById(`c${curSel}`).classList.remove("gazing");
            document.getElementById(`d${curSel}`).style.width = "0%";
        }
        curSel   = sel;
        selStart = performance.now();
        if (curSel !== -1) {
            document.getElementById(`c${curSel}`).classList.add("gazing");
        }
    }

    if (curSel !== -1) {
        const elapsed  = performance.now() - selStart;
        const progress = Math.min(elapsed / DWELL_MS * 100, 100);
        document.getElementById(`d${curSel}`).style.width = `${progress}%`;

        if (progress >= 100) decide(curSel);
    }

    requestAnimationFrame(gameLoop);
}

function decide(idx) {
    const now = performance.now();
    if (now - lastDecide < COOLDOWN_MS) return;
    lastDecide = now;

    const card = document.getElementById(`c${idx}`);
    if (card.classList.contains("woofing")) return;

    // プログレスリセット
    document.getElementById(`d${idx}`).style.width = "0%";
    selStart = performance.now() + COOLDOWN_MS; // クールダウン中は溜めない

    card.classList.add("woofing");
    bark();
    document.getElementById("status").textContent = "わんわん！🐾";

    setTimeout(() => {
        card.classList.remove("woofing");
        document.getElementById("status").textContent = "どのこをみてる？👀";
    }, 2000);
}

// ============================================================
//  WebGazer コールバック
// ============================================================
function onGazeData(data) {
    if (!data) return;
    // スムージング
    gazeX += (data.x - gazeX) * SMOOTH_K;
    gazeY += (data.y - gazeY) * SMOOTH_K;
}

// ============================================================
//  キャリブレーション
// ============================================================
// 9点キャリブレーション（画面の四隅・辺中央・中心）
const CALIB_POSITIONS = [
    [10, 10], [50, 10], [90, 10],
    [10, 50], [50, 50], [90, 50],
    [10, 90], [50, 90], [90, 90],
];
let calibIdx = 0;

function showCalibDot(idx) {
    const area = document.getElementById("calib-area");
    // 前の点を消す
    area.querySelectorAll(".calib-dot").forEach(d => d.remove());

    if (idx >= CALIB_POSITIONS.length) {
        // キャリブ完了
        area.style.display = "none";
        startGame();
        return;
    }

    const [px, py] = CALIB_POSITIONS[idx];
    const dot = document.createElement("div");
    dot.className = "calib-dot";
    dot.style.left = `${px}%`;
    dot.style.top  = `${py}%`;
    area.appendChild(dot);

    document.getElementById("calib-progress").textContent =
        `${idx + 1} / ${CALIB_POSITIONS.length}`;

    // タップまたは2秒注視で次へ
    let clicks = 0;
    const advance = () => {
        clicks++;
        if (clicks >= 1) {
            dot.classList.add("done");
            // WebGazerにこの点を学習させる
            webgazer.recordScreenPosition(
                window.innerWidth  * px / 100,
                window.innerHeight * py / 100,
                "click"
            );
            setTimeout(() => {
                calibIdx++;
                showCalibDot(calibIdx);
            }, 300);
        }
    };
    dot.addEventListener("click",      advance, { once: true });
    dot.addEventListener("touchstart", advance, { once: true, passive: true });

    // 自動進行（2秒後）—— タッチできない場合の補助
    setTimeout(() => { if (calibIdx === idx) advance(); }, 2000);
}

function startCalib() {
    document.getElementById("ov-loading").style.display = "none";
    document.getElementById("calib-area").style.display = "block";
    calibIdx = 0;
    showCalibDot(0);
}

function startGame() {
    cursor.style.display = "block";
    gameReady = true;
    document.getElementById("status").textContent = "どのこをみてる？👀";
    gameLoop();
}

// ============================================================
//  WebGazer 初期化
// ============================================================
async function init() {
    try {
        await webgazer
            .setGazeListener(onGazeData)
            .setRegression("ridge")       // 精度重視の回帰モデル
            .saveDataAcrossPages(false)   // セッション限定
            .begin();

        // WebGazerが生成したvideo/canvasを cam-wrap に移動して小さく表示
        const wgVideo  = document.getElementById("webgazerVideoFeed");
        const wgCanvas = document.getElementById("webgazerVideoCanvas") ||
                         document.getElementById("webgazerFaceOverlay");
        const wrap = document.getElementById("cam-wrap");
        if (wgVideo)  wrap.appendChild(wgVideo);
        if (wgCanvas) wrap.appendChild(wgCanvas);

        // WebGazerのデフォルトUIを非表示
        webgazer.showVideoPreview(false).showPredictionPoints(false);

        // カメラ準備完了 → キャリブへ
        setTimeout(startCalib, 800);

    } catch (e) {
        document.getElementById("ov-loading").style.display = "none";
        document.getElementById("err-title").textContent =
            e.name === "NotAllowedError" ? "カメラの許可が必要です" : "エラーが発生しました";
        document.getElementById("err-msg").textContent = e.message || String(e);
        document.getElementById("ov-error").style.display = "flex";
    }
}

// webgazer.jsの読み込み確認
window.addEventListener("load", () => {
    if (typeof webgazer === "undefined") {
        document.getElementById("ov-loading").style.display = "none";
        document.getElementById("err-title").textContent = "webgazer.jsが見つかりません";
        document.getElementById("err-msg").textContent =
            "unpkg.com への接続を確認してください（オフライン時は動作しません）";
        document.getElementById("ov-error").style.display = "flex";
        return;
    }
    init();
});
</script>
</body>
</html>
