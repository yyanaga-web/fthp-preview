<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>べんきょうモニター ⭐</title>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F7F3FF;
  --card: #FFFFFF;
  --text: #2D2D2D;
  --muted: #9A9A9A;
  --good: #4CAF82;
  --warn: #F5A623;
  --bad: #E85D5D;
  --accent: #7C5CBF;
  --accent2: #5B8DEF;
  --border: #EDE8F5;
  --shadow: rgba(124,92,191,0.10);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'M PLUS Rounded 1c', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
body::before {
  content: ''; position: fixed; inset: 0; z-index: 0;
  background-image: radial-gradient(circle, #D8CCF0 1.5px, transparent 1.5px);
  background-size: 28px 28px; opacity: 0.45; pointer-events: none;
}
.app { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; padding: 18px 14px 80px; }

/* Header */
.header { text-align: center; margin-bottom: 16px; }
.header-inner {
  display: inline-flex; align-items: center; gap: 8px;
  background: white; border-radius: 50px; padding: 9px 20px;
  box-shadow: 0 4px 20px var(--shadow); border: 2px solid var(--border);
}
.h-icon { font-size: 1.5rem; animation: spin-slow 8s linear infinite; }
@keyframes spin-slow { to { transform: rotate(360deg); } }
.h-title { font-size: 1rem; font-weight: 900; }
.h-title em { color: var(--accent); font-style: normal; }

/* Pomodoro */
.pomo-card {
  background: white; border-radius: 24px; padding: 18px 18px 16px;
  box-shadow: 0 6px 24px var(--shadow); border: 2px solid var(--border);
  margin-bottom: 12px;
}
.pomo-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.pomo-title { font-size: 0.8rem; font-weight: 900; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
.pomo-mode {
  font-size: 0.72rem; font-weight: 700; padding: 3px 10px; border-radius: 20px;
  background: rgba(124,92,191,0.12); color: var(--accent); border: 1px solid rgba(124,92,191,0.2);
}
.pomo-mode.break { background: rgba(76,175,130,0.12); color: var(--good); border-color: rgba(76,175,130,0.2); }
.pomo-timer { text-align: center; margin-bottom: 12px; }
.pomo-time {
  font-size: 3.2rem; font-weight: 900; line-height: 1;
  color: var(--accent); letter-spacing: -0.02em;
  transition: color 0.3s;
}
.pomo-time.break { color: var(--good); }
.pomo-time.urgent { color: var(--bad); }
.pomo-sub { font-size: 0.75rem; color: var(--muted); margin-top: 3px; }
.pomo-bar-wrap { background: var(--border); border-radius: 20px; height: 10px; overflow: hidden; margin-bottom: 12px; }
.pomo-bar { height: 100%; border-radius: 20px; background: var(--accent); transition: width 1s linear, background 0.3s; }
.pomo-bar.break { background: var(--good); }
.pomo-controls { display: flex; gap: 8px; }
.pomo-btn {
  flex: 1; padding: 9px; border: none; border-radius: 14px;
  font-family: inherit; font-size: 0.82rem; font-weight: 700;
  cursor: pointer; transition: all 0.15s;
}
.pomo-btn.primary { background: var(--accent); color: white; }
.pomo-btn.secondary { background: var(--border); color: var(--text); }
.pomo-btn:hover { filter: brightness(1.05); transform: translateY(-1px); }
.pomo-cycles { text-align: center; font-size: 0.75rem; color: var(--muted); margin-top: 8px; }
.pomo-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin: 0 2px; background: var(--border); transition: background 0.3s; }
.pomo-dot.done { background: var(--accent); }

/* Score card */
.score-card {
  background: white; border-radius: 24px; padding: 18px 16px 16px;
  box-shadow: 0 6px 24px var(--shadow); border: 2px solid var(--border);
  margin-bottom: 12px; transition: border-color 0.4s;
}
.score-card.ok   { border-color: var(--good); }
.score-card.warn { border-color: var(--warn); }
.score-card.bad  { border-color: var(--bad); }
.score-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
.score-face { font-size: 3rem; line-height: 1; flex-shrink: 0; }
.score-info { flex: 1; }
.score-label { font-size: 1rem; font-weight: 900; margin-bottom: 2px; }
.score-sub { font-size: 0.75rem; color: var(--muted); min-height: 1.2em; }
.gauge-wrap { background: var(--border); border-radius: 20px; height: 14px; overflow: hidden; }
.gauge-fill { height: 100%; border-radius: 20px; transition: width 0.6s cubic-bezier(.34,1.56,.64,1), background 0.4s; }

/* Camera */
.camera-card {
  background: #1a1a2e; border-radius: 22px; overflow: hidden;
  position: relative; aspect-ratio: 4/3; margin-bottom: 12px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.2); border: 3px solid white;
}
#videoEl { width: 100%; height: 100%; object-fit: cover; display: block; transform: scaleX(-1); }
#overlayCanvas { position: absolute; inset: 0; width: 100%; height: 100%; transform: scaleX(-1); pointer-events: none; }
.cam-placeholder {
  position: absolute; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 10px; color: rgba(255,255,255,0.4);
}
.cam-ph-icon { font-size: 3rem; }
.cam-ph-text { font-size: 0.82rem; }

/* Zone selector overlay */
.zone-hint {
  position: absolute; inset: 0; pointer-events: none; z-index: 5;
}
.zone-label {
  position: absolute; font-size: 0.65rem; font-weight: 700;
  color: rgba(255,255,255,0.7); background: rgba(0,0,0,0.4);
  padding: 2px 6px; border-radius: 6px; pointer-events: none;
}

.detect-badge {
  position: absolute; bottom: 10px; left: 10px; right: 10px;
  background: rgba(255,255,255,0.12); backdrop-filter: blur(10px);
  border-radius: 12px; padding: 7px 12px;
  display: flex; align-items: center; gap: 8px;
  border: 1px solid rgba(255,255,255,0.15);
}
.detect-dot { width: 8px; height: 8px; border-radius: 50%; background: #666; flex-shrink: 0; transition: background 0.3s; }
.detect-dot.live { background: var(--good); animation: blink 1.2s infinite; box-shadow: 0 0 6px var(--good); }
.detect-dot.warn { background: var(--warn); }
.detect-dot.bad  { background: var(--bad); animation: blink 0.6s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
.detect-text { font-size: 0.72rem; color: white; flex: 1; }

/* Loading */
.loading-overlay {
  position: absolute; inset: 0; background: rgba(26,26,46,0.92);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 12px; z-index: 10; border-radius: 19px;
}
.loading-overlay.hidden { display: none; }
.load-spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.15); border-top-color: #a78bfa; border-radius: 50%; animation: spin 0.9s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.load-text { color: white; font-size: 0.82rem; text-align: center; line-height: 1.6; }
.load-bar-wrap { width: 150px; height: 6px; background: rgba(255,255,255,0.15); border-radius: 10px; overflow: hidden; }
.load-bar { height: 100%; background: #a78bfa; border-radius: 10px; width: 0%; transition: width 0.4s; }

/* Detection panels */
.detect-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px; }
.detect-card {
  background: white; border-radius: 18px; padding: 12px 10px 10px;
  box-shadow: 0 4px 16px var(--shadow); border: 2px solid var(--border);
  text-align: center; transition: border-color 0.3s;
}
.detect-card.ok   { border-color: rgba(76,175,130,0.4); }
.detect-card.warn { border-color: rgba(245,166,35,0.4); }
.detect-card.bad  { border-color: rgba(232,93,93,0.4); }
.dc-icon { font-size: 1.2rem; }
.dc-name { font-size: 0.65rem; font-weight: 700; color: var(--muted); margin: 3px 0 5px; }
.dc-val { font-size: 0.8rem; font-weight: 900; transition: color 0.3s; }
.dc-mini-bar { height: 4px; background: var(--border); border-radius: 10px; overflow: hidden; margin-top: 5px; }
.dc-mini-fill { height: 100%; border-radius: 10px; transition: width 0.5s ease, background 0.3s; }

/* Stats */
.stats-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 12px; }
.stat-card { background: white; border-radius: 16px; padding: 10px 6px; text-align: center; box-shadow: 0 4px 16px var(--shadow); border: 2px solid var(--border); }
.stat-icon { font-size: 0.95rem; }
.stat-num { font-size: 1.2rem; font-weight: 900; margin: 1px 0; }
.stat-lbl { font-size: 0.6rem; color: var(--muted); }

/* Settings */
.settings-card { background: white; border-radius: 20px; padding: 14px; box-shadow: 0 4px 16px var(--shadow); border: 2px solid var(--border); margin-bottom: 12px; }
.settings-title { font-size: 0.75rem; font-weight: 900; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }
.setting-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.setting-row:last-child { margin-bottom: 0; }
.setting-lbl { flex: 1; font-size: 0.78rem; }
.setting-row input[type=range] { width: 80px; accent-color: var(--accent); }
.setting-val { font-weight: 900; font-size: 0.78rem; min-width: 34px; text-align: right; color: var(--accent); }
.setting-toggle {
  width: 42px; height: 24px; border-radius: 12px; background: var(--border);
  position: relative; cursor: pointer; transition: background 0.2s; flex-shrink: 0; border: none;
}
.setting-toggle.on { background: var(--accent); }
.setting-toggle::after {
  content: ''; position: absolute; width: 18px; height: 18px; border-radius: 50%;
  background: white; top: 3px; left: 3px; transition: left 0.2s;
  box-shadow: 0 1px 4px rgba(0,0,0,0.2);
}
.setting-toggle.on::after { left: 21px; }

/* Start button */
.btn-main {
  display: block; width: 100%; padding: 15px; border: none; border-radius: 18px;
  font-family: inherit; font-size: 1rem; font-weight: 900;
  cursor: pointer; transition: all 0.2s; margin-bottom: 12px;
}
.btn-main.start { background: linear-gradient(135deg, #7C5CBF, #5B8DEF); color: white; box-shadow: 0 6px 24px rgba(124,92,191,0.35); }
.btn-main.stop  { background: linear-gradient(135deg, #E85D5D, #c0392b); color: white; box-shadow: 0 6px 24px rgba(232,93,93,0.35); }
.btn-main:hover { transform: translateY(-2px); filter: brightness(1.06); }
.btn-main:active { transform: translateY(1px); }
.btn-main:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

/* Alert popup */
.alert-pop {
  position: fixed; bottom: -240px; left: 50%; transform: translateX(-50%);
  width: min(360px, 92vw); background: white; border-radius: 28px;
  border: 3px solid var(--bad); padding: 20px 22px; text-align: center;
  box-shadow: 0 24px 60px rgba(0,0,0,0.18); z-index: 200;
  transition: bottom 0.5s cubic-bezier(0.34,1.56,0.64,1);
}
.alert-pop.show { bottom: 20px; }
.alert-pop.break-alert { border-color: var(--good); }
.alert-pop-emoji { font-size: 3rem; }
.alert-pop-title { font-size: 1.2rem; font-weight: 900; margin: 6px 0 4px; }
.alert-pop-title.bad-col  { color: var(--bad); }
.alert-pop-title.good-col { color: var(--good); }
.alert-pop-reason { font-size: 0.8rem; color: var(--muted); margin-bottom: 8px; min-height: 1em; }
.alert-pop-msg { font-size: 0.9rem; font-weight: 700; }

/* Log */
.log-card { background: white; border-radius: 18px; padding: 12px 14px; box-shadow: 0 4px 16px var(--shadow); border: 2px solid var(--border); max-height: 150px; overflow-y: auto; }
.log-title { font-size: 0.72rem; font-weight: 900; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 7px; }
.log-item { display: flex; gap: 7px; padding: 3px 0; border-bottom: 1px solid var(--border); font-size: 0.75rem; }
.log-item:last-child { border: none; }
.log-time { color: var(--muted); font-size: 0.68rem; white-space: nowrap; }
.log-txt  { flex: 1; }
.log-item.is-alert .log-txt { color: var(--bad); font-weight: 700; }
.log-item.is-good  .log-txt { color: var(--good); font-weight: 700; }
.log-item.is-pomo  .log-txt { color: var(--accent); font-weight: 700; }

.confetti-wrap { position: fixed; inset: 0; pointer-events: none; z-index: 999; overflow: hidden; }
.confetti-p { position: absolute; border-radius: 2px; animation: fall linear forwards; }
@keyframes fall { 0%{transform:translateY(-20px) rotate(0deg);opacity:1} 100%{transform:translateY(105vh) rotate(720deg);opacity:0} }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <div class="header">
    <div class="header-inner">
      <span class="h-icon">📚</span>
      <span class="h-title">べんきょう<em>モニター</em></span>
    </div>
  </div>

  <!-- Pomodoro -->
  <div class="pomo-card">
    <div class="pomo-header">
      <span class="pomo-title">⏱ ポモドーロタイマー</span>
      <span class="pomo-mode" id="pomoMode">集中タイム</span>
    </div>
    <div class="pomo-timer">
      <div class="pomo-time" id="pomoTime">25:00</div>
      <div class="pomo-sub" id="pomoSub">スタートボタンで始めよう</div>
    </div>
    <div class="pomo-bar-wrap"><div class="pomo-bar" id="pomoBar" style="width:100%"></div></div>
    <div class="pomo-controls">
      <button class="pomo-btn primary" id="pomoStartBtn">▶ スタート</button>
      <button class="pomo-btn secondary" id="pomoResetBtn">↺ リセット</button>
    </div>
    <div class="pomo-cycles" id="pomoCycles">
      <span class="pomo-dot" id="pd0"></span>
      <span class="pomo-dot" id="pd1"></span>
      <span class="pomo-dot" id="pd2"></span>
      <span class="pomo-dot" id="pd3"></span>
    </div>
  </div>

  <!-- Score -->
  <div class="score-card" id="scoreCard">
    <div class="score-row">
      <span class="score-face" id="scoreFace">😴</span>
      <div class="score-info">
        <div class="score-label" id="scoreLabel">カメラをスタートしよう！</div>
        <div class="score-sub" id="scoreSub">下のボタンを押してね</div>
      </div>
    </div>
    <div class="gauge-wrap"><div class="gauge-fill" id="gaugeFill" style="width:0%;background:var(--muted)"></div></div>
  </div>

  <!-- Camera -->
  <div class="camera-card">
    <video id="videoEl" autoplay playsinline muted></video>
    <canvas id="overlayCanvas"></canvas>
    <div class="cam-placeholder" id="camPlaceholder">
      <div class="cam-ph-icon">📷</div>
      <div class="cam-ph-text">カメラをスタートしてね</div>
    </div>
    <div class="zone-hint" id="zoneHint"></div>
    <div class="loading-overlay hidden" id="loadingOverlay">
      <div class="load-spinner"></div>
      <div class="load-text" id="loadText">AIモデルを読み込み中…<br>少し待ってね</div>
      <div class="load-bar-wrap"><div class="load-bar" id="loadBar"></div></div>
    </div>
    <div class="detect-badge">
      <div class="detect-dot" id="detectDot"></div>
      <div class="detect-text" id="detectText">待機中</div>
    </div>
  </div>

  <!-- Detection cards -->
  <div class="detect-grid">
    <div class="detail-card detect-card" id="dc-face">
      <div class="dc-icon">👤</div><div class="dc-name">顔の向き</div>
      <div class="dc-val" id="dv-face">--</div>
      <div class="dc-mini-bar"><div class="dc-mini-fill" id="db-face" style="width:0%"></div></div>
    </div>
    <div class="detail-card detect-card" id="dc-eyes">
      <div class="dc-icon">👀</div><div class="dc-name">目の開き</div>
      <div class="dc-val" id="dv-eyes">--</div>
      <div class="dc-mini-bar"><div class="dc-mini-fill" id="db-eyes" style="width:0%"></div></div>
    </div>
    <div class="detail-card detect-card" id="dc-motion">
      <div class="dc-icon">✍️</div><div class="dc-name">手元の動き</div>
      <div class="dc-val" id="dv-motion">--</div>
      <div class="dc-mini-bar"><div class="dc-mini-fill" id="db-motion" style="width:0%"></div></div>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card"><div class="stat-icon">⏱️</div><div class="stat-num" id="statFocus">0:00</div><div class="stat-lbl">集中時間</div></div>
    <div class="stat-card"><div class="stat-icon">🔔</div><div class="stat-num" id="statAlerts">0</div><div class="stat-lbl">声がけ</div></div>
    <div class="stat-card"><div class="stat-icon">🍅</div><div class="stat-num" id="statPomos">0</div><div class="stat-lbl">完了セット</div></div>
  </div>

  <!-- Settings -->
  <div class="settings-card">
    <div class="settings-title">⚙ せってい</div>
    <div class="setting-row">
      <span class="setting-lbl">🍅 集中タイム（分）</span>
      <input type="range" id="pomoWorkMin" min="5" max="30" value="25" step="5">
      <span class="setting-val" id="pomoWorkVal">25分</span>
    </div>
    <div class="setting-row">
      <span class="setting-lbl">☕ 休憩タイム（分）</span>
      <input type="range" id="pomoBreakMin" min="3" max="15" value="5" step="1">
      <span class="setting-val" id="pomoBreakVal">5分</span>
    </div>
    <div class="setting-row">
      <span class="setting-lbl">🔔 声がけまでの時間</span>
      <input type="range" id="threshSlider" min="5" max="30" value="10" step="1">
      <span class="setting-val" id="threshVal">10秒</span>
    </div>
    <div class="setting-row">
      <span class="setting-lbl">✍️ 手元の静止警告</span>
      <input type="range" id="motionThresh" min="10" max="60" value="30" step="5">
      <span class="setting-val" id="motionThreshVal">30秒</span>
    </div>
    <div class="setting-row">
      <span class="setting-lbl">🔊 音量</span>
      <input type="range" id="volSlider" min="0" max="1" value="0.8" step="0.1">
      <span class="setting-val" id="volVal">80%</span>
    </div>
  </div>

  <button class="btn-main start" id="mainBtn">📷 カメラをスタート</button>

  <div class="log-card">
    <div class="log-title">📋 きろく</div>
    <div id="logList"></div>
  </div>
</div>

<!-- Alert popup -->
<div class="alert-pop" id="alertPop">
  <div class="alert-pop-emoji" id="apEmoji">😮</div>
  <div class="alert-pop-title" id="apTitle">集中しよう！</div>
  <div class="alert-pop-reason" id="apReason"></div>
  <div class="alert-pop-msg" id="apMsg">もうひとふんばりできるよ！</div>
</div>
<div class="confetti-wrap" id="confettiWrap"></div>

<script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
<script>
// =============================================
// STATE
// =============================================
const S = {
  // camera/detection
  running: false, modelsLoaded: false,
  lastFocused: false, unfocusedSec: 0, focusedSec: 0,
  focusSec: 0, totalSec: 0, alertCount: 0, alertCooldown: false,
  mainTimer: null,

  // settings
  thresh: 10, motionThreshSec: 30, volume: 0.8,

  // pomodoro
  pomoRunning: false, pomoIsBreak: false,
  pomoWorkSec: 25*60, pomoBreakSec: 5*60,
  pomoRemaining: 25*60, pomoTotal: 25*60,
  pomoTimer: null, pomoCycles: 0,

  // motion detection
  prevFrameData: null, motionStillSec: 0, lastMotionScore: 0,
  motionCanvas: null, motionCtx: null,
  motionAlertCooldown: false,
};

const FOCUS_ALERTS = [
  { emoji:'😊', title:'集中しよう！',      msg:'勉強がんばれ！きみならできる！' },
  { emoji:'💪', title:'もうひとふんばり！', msg:'あとすこしで終わるよ！' },
  { emoji:'👀', title:'教材を見てみよう！', msg:'目線を本に戻してね！' },
  { emoji:'🌟', title:'集中モード、オン！', msg:'深呼吸して集中しよう！' },
  { emoji:'🚀', title:'ファイト！',         msg:'集中パワーを出して！' },
];
const MOTION_ALERTS = [
  { emoji:'✍️', title:'えんぴつ動かそう！', msg:'すこし書いてみてね！' },
  { emoji:'📝', title:'書いてる？',          msg:'手が止まってるみたいだよ！' },
  { emoji:'🖊️', title:'つづきを書こう！',   msg:'えんぴつを動かしてみてね！' },
];
const BREAK_START = { emoji:'☕', title:'休憩タイム！', msg:'よくがんばった！すこし休んでね。' };
const BREAK_END   = { emoji:'📚', title:'さあ、また始めよう！', msg:'次の集中タイムのスタートだよ！' };

// =============================================
// DOM
// =============================================
const videoEl       = document.getElementById('videoEl');
const overlayCanvas = document.getElementById('overlayCanvas');
const ctx           = overlayCanvas.getContext('2d');
const camPlaceholder= document.getElementById('camPlaceholder');
const loadingOverlay= document.getElementById('loadingOverlay');
const loadText      = document.getElementById('loadText');
const loadBar       = document.getElementById('loadBar');
const scoreCard     = document.getElementById('scoreCard');
const scoreFace     = document.getElementById('scoreFace');
const scoreLabel    = document.getElementById('scoreLabel');
const scoreSub      = document.getElementById('scoreSub');
const gaugeFill     = document.getElementById('gaugeFill');
const detectDot     = document.getElementById('detectDot');
const detectText    = document.getElementById('detectText');
const alertPop      = document.getElementById('alertPop');
const mainBtn       = document.getElementById('mainBtn');
const logList       = document.getElementById('logList');

// Settings
function bindSlider(id, valId, suffix, key, mult=1) {
  const el = document.getElementById(id);
  el.addEventListener('input', e => {
    S[key] = +e.target.value * mult;
    document.getElementById(valId).textContent = e.target.value + suffix;
  });
}
bindSlider('threshSlider',  'threshVal',       '秒',  'thresh');
bindSlider('motionThresh',  'motionThreshVal', '秒',  'motionThreshSec');
bindSlider('volSlider',     'volVal',          '%',   'volume', 0); // handle separately
document.getElementById('volSlider').addEventListener('input', e => {
  S.volume = +e.target.value;
  document.getElementById('volVal').textContent = Math.round(S.volume*100)+'%';
});
document.getElementById('pomoWorkMin').addEventListener('input', e => {
  S.pomoWorkSec = +e.target.value * 60;
  document.getElementById('pomoWorkVal').textContent = e.target.value + '分';
  if (!S.pomoRunning && !S.pomoIsBreak) resetPomo();
});
document.getElementById('pomoBreakMin').addEventListener('input', e => {
  S.pomoBreakSec = +e.target.value * 60;
  document.getElementById('pomoBreakVal').textContent = e.target.value + '分';
});

// =============================================
// POMODORO
// =============================================
function resetPomo() {
  S.pomoRemaining = S.pomoWorkSec;
  S.pomoTotal     = S.pomoWorkSec;
  S.pomoIsBreak   = false;
  updatePomoUI();
}

function updatePomoUI() {
  const m = Math.floor(S.pomoRemaining/60);
  const s = S.pomoRemaining % 60;
  const timeEl  = document.getElementById('pomoTime');
  const modeEl  = document.getElementById('pomoMode');
  const barEl   = document.getElementById('pomoBar');
  const subEl   = document.getElementById('pomoSub');
  timeEl.textContent = m+':'+String(s).padStart(2,'0');
  const pct = S.pomoTotal > 0 ? (S.pomoRemaining / S.pomoTotal)*100 : 100;
  barEl.style.width = pct + '%';

  if (S.pomoIsBreak) {
    timeEl.className = 'pomo-time break';
    modeEl.textContent = '休憩タイム ☕'; modeEl.className = 'pomo-mode break';
    barEl.className = 'pomo-bar break';
    subEl.textContent = 'よく集中できたね！ゆっくり休んでね';
  } else {
    const urgent = S.pomoRemaining <= 60;
    timeEl.className = 'pomo-time' + (urgent ? ' urgent' : '');
    modeEl.textContent = '集中タイム 📚'; modeEl.className = 'pomo-mode';
    barEl.className = 'pomo-bar';
    subEl.textContent = S.pomoRunning ? (urgent ? 'あと少し！ファイト！' : 'がんばって勉強しよう！') : 'スタートボタンで始めよう';
  }

  // Dots
  for (let i=0;i<4;i++) {
    document.getElementById('pd'+i).className = 'pomo-dot' + (i < S.pomoCycles ? ' done' : '');
  }
  document.getElementById('statPomos').textContent = S.pomoCycles;
}

function tickPomo() {
  if (!S.pomoRunning) return;
  S.pomoRemaining--;
  updatePomoUI();

  if (S.pomoRemaining <= 0) {
    if (!S.pomoIsBreak) {
      // Work session done → break
      S.pomoCycles++;
      S.pomoIsBreak   = true;
      S.pomoRemaining = S.pomoBreakSec;
      S.pomoTotal     = S.pomoBreakSec;
      updatePomoUI();
      showAlert(BREAK_START, 'break');
      addLog('☕ 休憩タイム！よくがんばりました！', false, false, true);
      celebrate();
    } else {
      // Break done → work
      S.pomoIsBreak   = false;
      S.pomoRemaining = S.pomoWorkSec;
      S.pomoTotal     = S.pomoWorkSec;
      updatePomoUI();
      showAlert(BREAK_END, 'break');
      addLog('📚 集中タイム再開！', false, true, false);
    }
  }
}

document.getElementById('pomoStartBtn').addEventListener('click', () => {
  if (S.pomoRunning) {
    S.pomoRunning = false;
    clearInterval(S.pomoTimer);
    document.getElementById('pomoStartBtn').textContent = '▶ スタート';
  } else {
    S.pomoRunning = true;
    S.pomoTimer = setInterval(tickPomo, 1000);
    document.getElementById('pomoStartBtn').textContent = '⏸ 一時停止';
    updatePomoUI();
  }
});
document.getElementById('pomoResetBtn').addEventListener('click', () => {
  S.pomoRunning = false;
  clearInterval(S.pomoTimer);
  resetPomo();
  document.getElementById('pomoStartBtn').textContent = '▶ スタート';
});

// =============================================
// LOAD MODELS
// =============================================
async function loadModels() {
  loadingOverlay.classList.remove('hidden');
  loadText.textContent = 'AIモデルを読み込み中…\n少し待ってね';
  loadBar.style.width = '10%';
  try {
    const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model';
    await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
    loadBar.style.width = '45%';
    await faceapi.nets.faceLandmark68TinyNet.loadFromUri(MODEL_URL);
    loadBar.style.width = '80%';
    await faceapi.nets.faceExpressionNet.loadFromUri(MODEL_URL);
    loadBar.style.width = '100%';
    S.modelsLoaded = true;
    loadingOverlay.classList.add('hidden');
    addLog('✅ AIモデル読み込み完了！', false, true);
    return true;
  } catch(e) {
    loadText.textContent = '読み込みに失敗…\nリロードしてみてね😢';
    addLog('❌ モデル読み込みエラー: ' + e.message);
    return false;
  }
}

// =============================================
// FACE ANALYSIS
// =============================================
function analyzeFace(det) {
  const lm   = det.landmarks;
  const expr = det.expressions;

  const leftEye  = lm.getLeftEye();
  const rightEye = lm.getRightEye();
  const nose     = lm.getNose();
  const jaw      = lm.getJawOutline();

  // Head pitch: nose tip position within face height
  const faceTop    = Math.min(...leftEye.map(p=>p.y), ...rightEye.map(p=>p.y));
  const faceBottom = jaw[8].y;
  const faceH      = faceBottom - faceTop;
  const noseTip    = nose[3];
  const noseRatio  = faceH > 1 ? (noseTip.y - faceTop) / faceH : 0.55;

  // 正常な勉強姿勢は少し下向き → 0.45〜0.80を正常範囲とする
  const lookingUp      = noseRatio < 0.40;  // 天井を見ている
  const lookingFarDown = noseRatio > 0.85;  // うつぶせ・居眠り（極端な下向き）
  // 少し下（0.55〜0.80）は教材を見ている正常状態 → ペナルティなし

  // Head yaw: symmetry of jaw outline
  const jawLeft  = jaw[0];
  const jawRight = jaw[16];
  const jawMidX  = (jawLeft.x + jawRight.x) / 2;
  const noseDeviation = Math.abs(noseTip.x - jawMidX) / (Math.abs(jawRight.x - jawLeft.x) / 2 + 1);
  const lookingSide = noseDeviation > 0.25; // 横を向いている

  // Head roll: eye line tilt
  const lEyeCx = leftEye.reduce((s,p)=>s+p.x,0)/leftEye.length;
  const lEyeCy = leftEye.reduce((s,p)=>s+p.y,0)/leftEye.length;
  const rEyeCx = rightEye.reduce((s,p)=>s+p.x,0)/rightEye.length;
  const rEyeCy = rightEye.reduce((s,p)=>s+p.y,0)/rightEye.length;
  const eyeDx  = rEyeCx - lEyeCx, eyeDy = rEyeCy - lEyeCy;
  const tilt   = Math.abs(eyeDy) / (Math.sqrt(eyeDx*eyeDx+eyeDy*eyeDy)+0.001);
  const headTilted = tilt > 0.20; // 頬杖・寝転び

  // Eye Aspect Ratio
  function ear(pts) {
    const h1 = Math.abs(pts[1].y-pts[5].y), h2 = Math.abs(pts[2].y-pts[4].y);
    const w  = Math.abs(pts[0].x-pts[3].x);
    return w > 0 ? (h1+h2)/(2*w) : 0.3;
  }
  const avgEAR    = (ear(leftEye)+ear(rightEye))/2;
  const eyesClosed = avgEAR < 0.17;
  const eyesDroopy = avgEAR < 0.21 && !eyesClosed;
  const sleepy     = (expr.sleepy||0) > 0.28;

  // --- SCORES ---
  let faceScore = 100;
  if (lookingUp)       faceScore -= 65;
  if (lookingSide)     faceScore -= 55;
  if (headTilted)      faceScore -= 50;
  if (lookingFarDown)  faceScore -= 45;
  faceScore = Math.max(0, faceScore);

  let eyeScore = 100;
  if (eyesClosed)             eyeScore = 5;
  else if (eyesDroopy||sleepy) eyeScore = 38;
  eyeScore = Math.max(0, eyeScore);

  const reasons = [];
  if (lookingUp)       reasons.push('上を向いてるよ 👆');
  if (lookingSide)     reasons.push('横を向いてるよ 👉');
  if (headTilted)      reasons.push('頭が傾いてるよ 😪');
  if (lookingFarDown)  reasons.push('うつぶせになってるよ 😴');
  if (eyesClosed)      reasons.push('目が閉じてるよ 😴');
  else if(eyesDroopy||sleepy) reasons.push('眠そうだよ 🥱');

  return { faceScore, eyeScore, reasons };
}

function drawFaceOverlay(det, faceScore) {
  overlayCanvas.width  = videoEl.videoWidth  || overlayCanvas.clientWidth;
  overlayCanvas.height = videoEl.videoHeight || overlayCanvas.clientHeight;
  ctx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
  const col = faceScore >= 70 ? 'rgba(76,175,130,0.7)' : 'rgba(232,93,93,0.7)';
  const lm  = det.landmarks;
  [lm.getLeftEye(), lm.getRightEye()].forEach(eye => {
    ctx.beginPath();
    eye.forEach((p,i) => i===0 ? ctx.moveTo(p.x,p.y) : ctx.lineTo(p.x,p.y));
    ctx.closePath(); ctx.strokeStyle = col; ctx.lineWidth = 2; ctx.stroke();
  });
  const nose = lm.getNose()[3];
  ctx.beginPath(); ctx.arc(nose.x, nose.y, 4, 0, Math.PI*2);
  ctx.fillStyle = col; ctx.fill();
  const box = det.detection.box;
  ctx.strokeStyle = col.replace('0.7','0.25'); ctx.lineWidth = 1.5;
  ctx.strokeRect(box.x, box.y, box.width, box.height);
}

// =============================================
// MOTION DETECTION (pixel diff on lower half)
// =============================================
function initMotionCanvas() {
  S.motionCanvas = document.createElement('canvas');
  S.motionCanvas.width  = 80; // small for perf
  S.motionCanvas.height = 60;
  S.motionCtx = S.motionCanvas.getContext('2d');
}

function calcMotionScore() {
  if (!S.motionCanvas || !videoEl.videoWidth) return 50;
  const mc = S.motionCanvas, mctx = S.motionCtx;

  // Capture LOWER 50% of frame (desk/hand area)
  mctx.drawImage(videoEl,
    0, videoEl.videoHeight * 0.5,       // source: lower half
    videoEl.videoWidth, videoEl.videoHeight * 0.5,
    0, 0, mc.width, mc.height
  );

  const curr = mctx.getImageData(0, 0, mc.width, mc.height).data;
  if (!S.prevFrameData) { S.prevFrameData = curr.slice(); return 50; }

  let diff = 0;
  for (let i = 0; i < curr.length; i += 4) {
    diff += Math.abs(curr[i]   - S.prevFrameData[i])
          + Math.abs(curr[i+1] - S.prevFrameData[i+1])
          + Math.abs(curr[i+2] - S.prevFrameData[i+2]);
  }
  S.prevFrameData = curr.slice();
  // normalize: pixels * channels, max ~255*3 each
  const pixels = mc.width * mc.height;
  const avgDiff = diff / (pixels * 3);
  // avgDiff 0〜255. 書いている時 ~5〜20, 静止 ~0〜3
  return Math.min(100, Math.round(avgDiff * 6));
}

// =============================================
// COMBINED FOCUS EVALUATION
// =============================================
function evaluateFocus(faceResult, motionScore) {
  const faceFocused   = faceResult.faceScore  >= 60;
  const eyeFocused    = faceResult.eyeScore   >= 60;
  const overallScore  = Math.round(faceResult.faceScore*0.45 + faceResult.eyeScore*0.35 + Math.min(motionScore*1.5,100)*0.20);
  const focused       = overallScore >= 55;
  return { overallScore, focused };
}

// =============================================
// UI UPDATE
// =============================================
function updateDetectCard(id, score, label) {
  const col = score>=70?'var(--good)':score>=40?'var(--warn)':'var(--bad)';
  const cls = score>=70?'ok':score>=40?'warn':'bad';
  document.getElementById('dc-'+id).className = 'detail-card detect-card '+cls;
  const v = document.getElementById('dv-'+id); v.textContent=label; v.style.color=col;
  const b = document.getElementById('db-'+id); b.style.width=score+'%'; b.style.background=col;
}

function updateMainUI(overallScore, focused, reasons, motionScore) {
  scoreCard.className = 'score-card '+(focused?'ok':overallScore>=40?'warn':'bad');
  scoreFace.textContent = focused ? '😊' : overallScore>=40 ? '😕' : '😵';
  scoreLabel.textContent = focused ? '集中してるね！すごい！' : (reasons[0]||'集中が切れてるかも？');
  scoreSub.textContent   = focused ? '✨ このちょうしでがんばれ！' : reasons.slice(1).join(' ')||'';
  gaugeFill.style.width  = overallScore+'%';
  gaugeFill.style.background = overallScore>=70?'var(--good)':overallScore>=40?'var(--warn)':'var(--bad)';
  detectDot.className = 'detect-dot '+(focused?'live':'bad');
  detectText.textContent = focused?'集中しているよ！':(reasons[0]||'ちょっと集中が切れてる');
}

function updateNoFace(motionScore) {
  scoreCard.className = 'score-card warn';
  scoreFace.textContent = '🔍';
  scoreLabel.textContent = '顔が見えないよ…';
  scoreSub.textContent = 'カメラの前に座ってね';
  gaugeFill.style.width = '0%'; gaugeFill.style.background = 'var(--muted)';
  detectDot.className = 'detect-dot warn';
  detectText.textContent = '顔を探してるよ…';
  updateDetectCard('face',  0, '未検出');
  updateDetectCard('eyes',  0, '--');
  const mLabel = motionScore>=15?'動いてる':motionScore>=5?'少し動く':'止まってる';
  updateDetectCard('motion', Math.min(100,motionScore*3), mLabel);
}

// =============================================
// DETECTION LOOP
// =============================================
async function detectionLoop() {
  if (!S.running || !S.modelsLoaded) return;
  try {
    const dets = await faceapi
      .detectAllFaces(videoEl, new faceapi.TinyFaceDetectorOptions({inputSize:224, scoreThreshold:0.4}))
      .withFaceLandmarks(true)
      .withFaceExpressions();

    if (!S.running) return;
    const motionScore = calcMotionScore();
    S.lastMotionScore = motionScore;

    if (dets && dets.length > 0) {
      const det = dets[0];
      const faceResult = analyzeFace(det);
      const { overallScore, focused } = evaluateFocus(faceResult, motionScore);
      drawFaceOverlay(det, faceResult.faceScore);
      updateMainUI(overallScore, focused, faceResult.reasons, motionScore);
      updateDetectCard('face',  faceResult.faceScore,
        faceResult.faceScore>=70?'◎ 正面向き':faceResult.faceScore>=40?'△ 注意':'× NG');
      updateDetectCard('eyes',  faceResult.eyeScore,
        faceResult.eyeScore>=70?'◎ 開いてる':faceResult.eyeScore>=40?'△ 眠い':'× 閉じ');
      const mLabel = motionScore>=15?'◎ 動いてる':motionScore>=5?'△ 少し動く':'× 止まってる';
      updateDetectCard('motion', Math.min(100,motionScore*3), mLabel);
      S.lastFocused = focused;
    } else {
      ctx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
      updateNoFace(motionScore);
      S.lastFocused = false;
    }
  } catch(e) { /* silent */ }

  if (S.running) setTimeout(detectionLoop, 800);
}

// =============================================
// MAIN TIMER (1s tick)
// =============================================
function startMainTimer() {
  if (S.mainTimer) clearInterval(S.mainTimer);
  S.mainTimer = setInterval(() => {
    if (!S.running) return;
    S.totalSec++;

    // Focus tracking
    if (S.lastFocused) {
      S.focusSec++; S.focusedSec++; S.unfocusedSec = 0;
      if (S.focusedSec === 300) celebrate('focus');
    } else {
      S.unfocusedSec++; S.focusedSec = 0;
      if (S.unfocusedSec >= S.thresh && !S.alertCooldown) {
        triggerAlert('focus');
      }
    }

    // Motion tracking (only during work, not break)
    if (!S.pomoIsBreak) {
      if (S.lastMotionScore < 4) {
        S.motionStillSec++;
        if (S.motionStillSec >= S.motionThreshSec && !S.motionAlertCooldown) {
          triggerAlert('motion');
        }
      } else {
        S.motionStillSec = 0;
      }
    }

    // Stats
    const m = Math.floor(S.focusSec/60), sec = S.focusSec%60;
    document.getElementById('statFocus').textContent = m+':'+String(sec).padStart(2,'0');
  }, 1000);
}

// =============================================
// ALERTS
// =============================================
let alertQueue = [];
let alertShowing = false;

function triggerAlert(type) {
  if (type === 'focus') {
    S.alertCooldown = true;
    S.alertCount++;
    document.getElementById('statAlerts').textContent = S.alertCount;
    const a = FOCUS_ALERTS[S.alertCount % FOCUS_ALERTS.length];
    showAlert(a, 'bad');
    addLog(a.emoji+' '+a.title, true);
    setTimeout(() => {
      S.unfocusedSec = 0;
      setTimeout(() => { S.alertCooldown = false; }, S.thresh * 1200);
    }, 4000);
  } else if (type === 'motion') {
    S.motionAlertCooldown = true;
    const a = MOTION_ALERTS[Math.floor(Math.random()*MOTION_ALERTS.length)];
    showAlert(a, 'bad');
    addLog(a.emoji+' '+a.title, true);
    setTimeout(() => {
      S.motionStillSec = 0;
      setTimeout(() => { S.motionAlertCooldown = false; }, S.motionThreshSec * 1000);
    }, 4000);
  }
}

function showAlert(a, type) {
  document.getElementById('apEmoji').textContent   = a.emoji;
  document.getElementById('apTitle').textContent   = a.title;
  document.getElementById('apTitle').className     = 'alert-pop-title '+(type==='break'?'good-col':'bad-col');
  document.getElementById('apReason').textContent  = a.reason||'';
  document.getElementById('apMsg').textContent     = a.msg;
  alertPop.className = 'alert-pop show' + (type==='break'?' break-alert':'');
  speak(a.title + '。' + a.msg);
  setTimeout(() => { alertPop.className = 'alert-pop'; }, 4000);
}

// =============================================
// TTS
// =============================================
function speak(text) {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang='ja-JP'; u.rate=0.92; u.pitch=1.1; u.volume=S.volume;
  const v = speechSynthesis.getVoices().find(v=>v.lang.startsWith('ja'));
  if (v) u.voice=v;
  speechSynthesis.speak(u);
}

// =============================================
// CELEBRATE
// =============================================
function celebrate(type='focus') {
  const wrap = document.getElementById('confettiWrap');
  const cols = ['#f87171','#fbbf24','#4ade80','#60a5fa','#a78bfa','#fb923c'];
  for (let i=0;i<80;i++) {
    const el = document.createElement('div'); el.className = 'confetti-p';
    const sz = 6+Math.random()*10;
    el.style.cssText=`left:${Math.random()*100}%;top:-15px;background:${cols[~~(Math.random()*cols.length)]};width:${sz}px;height:${sz}px;animation-duration:${1.5+Math.random()*2.5}s;animation-delay:${Math.random()*0.5}s;`;
    wrap.appendChild(el); setTimeout(()=>el.remove(),5000);
  }
  if (type==='focus') {
    speak('すごい！5分間よく集中できたね！さいこう！');
    addLog('🎉 5分間集中達成！', false, true);
  }
}

// =============================================
// LOG
// =============================================
function addLog(text, isAlert=false, isGood=false, isPomo=false) {
  const n = new Date();
  const t = n.getHours()+':'+String(n.getMinutes()).padStart(2,'0')+':'+String(n.getSeconds()).padStart(2,'0');
  const d = document.createElement('div');
  d.className = 'log-item'+(isAlert?' is-alert':isGood?' is-good':isPomo?' is-pomo':'');
  d.innerHTML = `<span class="log-time">${t}</span><span class="log-txt">${text}</span>`;
  logList.prepend(d);
  if (logList.children.length > 50) logList.removeChild(logList.lastChild);
}

// =============================================
// START / STOP
// =============================================
async function startMonitor() {
  mainBtn.disabled = true; mainBtn.textContent = '起動中…';

  try {
    const stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:320,height:240}});
    videoEl.srcObject = stream;
    await videoEl.play();
    camPlaceholder.style.display = 'none';
  } catch(e) {
    addLog('❌ カメラエラー: '+e.message);
    mainBtn.disabled=false; mainBtn.textContent='📷 カメラをスタート'; mainBtn.className='btn-main start';
    return;
  }

  if (!S.modelsLoaded) {
    const ok = await loadModels();
    if (!ok) { mainBtn.disabled=false; mainBtn.textContent='📷 カメラをスタート'; mainBtn.className='btn-main start'; return; }
  }

  initMotionCanvas();

  S.running=true; S.focusSec=0; S.totalSec=0; S.alertCount=0;
  S.unfocusedSec=0; S.focusedSec=0; S.motionStillSec=0;
  S.alertCooldown=false; S.motionAlertCooldown=false; S.lastFocused=false;
  S.prevFrameData=null;
  logList.innerHTML='';
  document.getElementById('statAlerts').textContent='0';

  mainBtn.disabled=false; mainBtn.className='btn-main stop'; mainBtn.textContent='⏹ ストップ';
  detectDot.className='detect-dot live'; detectText.textContent='検出中…';
  addLog('📷 モニタリング開始', false, true);
  startMainTimer();
  detectionLoop();
}

function stopMonitor() {
  S.running=false;
  if (S.mainTimer) clearInterval(S.mainTimer);
  if (videoEl.srcObject) { videoEl.srcObject.getTracks().forEach(t=>t.stop()); videoEl.srcObject=null; }
  ctx.clearRect(0,0,overlayCanvas.width,overlayCanvas.height);
  camPlaceholder.style.display='flex';
  alertPop.className='alert-pop';
  scoreCard.className='score-card';
  scoreFace.textContent='😴'; scoreLabel.textContent='おつかれさま！';
  scoreSub.textContent='集中時間: '+document.getElementById('statFocus').textContent;
  gaugeFill.style.width='0%'; gaugeFill.style.background='var(--muted)';
  detectDot.className='detect-dot'; detectText.textContent='待機中';
  mainBtn.className='btn-main start'; mainBtn.textContent='📷 カメラをスタート';
  addLog('⏹ 終了（集中時間: '+document.getElementById('statFocus').textContent+'）');
  speechSynthesis&&speechSynthesis.cancel();
}

mainBtn.addEventListener('click', () => { if (S.running) stopMonitor(); else startMonitor(); });
resetPomo();
window.addEventListener('load', () => {
  if (window.speechSynthesis) { speechSynthesis.getVoices(); speechSynthesis.addEventListener('voiceschanged',()=>speechSynthesis.getVoices()); }
});
