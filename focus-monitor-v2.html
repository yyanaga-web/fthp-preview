<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>集中モニター AI版 ⭐</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&family=Nunito:wght@700;900&display=swap');

:root {
  --bg: #0f1117;
  --panel: #181c27;
  --panel2: #1e2335;
  --border: rgba(255,255,255,0.07);
  --text: #e8eaf6;
  --muted: #7b82a0;
  --good: #4ade80;
  --warn: #fbbf24;
  --bad: #f87171;
  --info: #60a5fa;
  --accent: #a78bfa;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Zen Maru Gothic', 'Nunito', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 0 0 60px;
}

body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background-image:
    linear-gradient(rgba(167,139,250,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(167,139,250,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
}

.app {
  position: relative; z-index: 1;
  max-width: 860px;
  margin: 0 auto;
  padding: 24px 16px;
}

header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
  gap: 12px;
}
.logo { display: flex; align-items: center; gap: 10px; }
.logo-icon {
  width: 40px; height: 40px;
  background: linear-gradient(135deg, var(--accent), #60a5fa);
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.3rem;
  box-shadow: 0 0 20px rgba(167,139,250,0.4);
}
.logo-text { font-size: 1.1rem; font-weight: 900; letter-spacing: 0.02em; }
.logo-text span { color: var(--accent); }
.header-badge {
  background: rgba(167,139,250,0.15);
  border: 1px solid rgba(167,139,250,0.3);
  border-radius: 20px;
  padding: 4px 12px;
  font-size: 0.72rem;
  color: var(--accent);
  font-weight: 700;
  letter-spacing: 0.05em;
}

.main-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 16px;
}
@media (max-width: 600px) { .main-grid { grid-template-columns: 1fr; } }

.camera-panel {
  grid-row: span 2;
  background: var(--panel);
  border-radius: 20px;
  overflow: hidden;
  border: 1px solid var(--border);
  position: relative;
  aspect-ratio: 3/4;
  min-height: 320px;
}
.camera-inner { position: relative; width: 100%; height: 100%; }
#videoEl {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  transform: scaleX(-1);
  border-radius: 20px;
}
.cam-placeholder {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 10px; color: var(--muted);
}
.cam-placeholder-icon { font-size: 3rem; opacity: 0.4; }
.cam-placeholder p { font-size: 0.85rem; }

.scan-line {
  position: absolute; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  opacity: 0; pointer-events: none;
  animation: scanDown 2s linear infinite; z-index: 5;
}
.scan-line.active { opacity: 0.6; }
@keyframes scanDown { 0% { top: 0%; } 100% { top: 100%; } }

.corner {
  position: absolute; width: 20px; height: 20px;
  border-color: var(--accent); border-style: solid; opacity: 0.6; z-index: 6;
}
.corner-tl { top:10px; left:10px; border-width:2px 0 0 2px; border-radius:4px 0 0 0; }
.corner-tr { top:10px; right:10px; border-width:2px 2px 0 0; border-radius:0 4px 0 0; }
.corner-bl { bottom:10px; left:10px; border-width:0 0 2px 2px; border-radius:0 0 0 4px; }
.corner-br { bottom:10px; right:10px; border-width:0 2px 2px 0; border-radius:0 0 4px 0; }

.cam-status-badge {
  position: absolute; bottom: 12px; left: 12px; right: 12px;
  background: rgba(15,17,23,0.85); backdrop-filter: blur(8px);
  border-radius: 12px; padding: 8px 12px;
  display: flex; align-items: center; gap: 8px;
  border: 1px solid var(--border); z-index: 7; transition: border-color 0.3s;
}
.cam-status-badge.ok   { border-color: rgba(74,222,128,0.4); }
.cam-status-badge.warn { border-color: rgba(251,191,36,0.4); }
.cam-status-badge.bad  { border-color: rgba(248,113,113,0.4); }
.status-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--muted); flex-shrink: 0; transition: background 0.3s;
}
.status-dot.ok   { background: var(--good); box-shadow: 0 0 8px var(--good); animation: pulse-g 1.5s infinite; }
.status-dot.warn { background: var(--warn); box-shadow: 0 0 8px var(--warn); }
.status-dot.bad  { background: var(--bad);  box-shadow: 0 0 8px var(--bad); animation: pulse-r 0.8s infinite; }
@keyframes pulse-g { 0%,100%{opacity:1} 50%{opacity:0.5} }
@keyframes pulse-r { 0%,100%{opacity:1} 50%{opacity:0.3} }
.cam-status-text { font-size: 0.78rem; color: var(--text); flex: 1; }
.cam-status-time { font-size: 0.7rem; color: var(--muted); }

.score-panel {
  background: var(--panel); border-radius: 20px;
  border: 1px solid var(--border); padding: 20px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 8px;
}
.score-ring-wrap { position: relative; width: 110px; height: 110px; }
.score-svg { width: 110px; height: 110px; transform: rotate(-90deg); }
.score-track { fill: none; stroke: var(--panel2); stroke-width: 8; }
.score-fill {
  fill: none; stroke-width: 8; stroke-linecap: round;
  stroke-dasharray: 283; stroke-dashoffset: 283;
  transition: stroke-dashoffset 0.8s ease, stroke 0.5s;
}
.score-center {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
}
.score-num { font-size: 1.9rem; font-weight: 900; line-height: 1; transition: color 0.5s; }
.score-lbl { font-size: 0.65rem; color: var(--muted); margin-top: 1px; }
.score-title { font-size: 0.8rem; color: var(--muted); font-weight: 700; }
.reason-tags { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; min-height: 28px; }
.tag { font-size: 0.7rem; border-radius: 20px; padding: 3px 9px; font-weight: 700; }
.tag.bad  { background: rgba(248,113,113,0.15); color: var(--bad);  border: 1px solid rgba(248,113,113,0.3); }
.tag.warn { background: rgba(251,191,36,0.12);  color: var(--warn); border: 1px solid rgba(251,191,36,0.3); }
.tag.ok   { background: rgba(74,222,128,0.12);  color: var(--good); border: 1px solid rgba(74,222,128,0.3); }

.detail-panel {
  background: var(--panel); border-radius: 20px;
  border: 1px solid var(--border); padding: 16px;
}
.detail-title { font-size: 0.75rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 12px; }
.detail-rows { display: flex; flex-direction: column; gap: 8px; }
.detail-row { display: flex; align-items: center; gap: 8px; font-size: 0.82rem; }
.detail-row-label { color: var(--muted); width: 80px; flex-shrink: 0; }
.detail-bar-wrap { flex: 1; height: 6px; background: var(--panel2); border-radius: 10px; overflow: hidden; }
.detail-bar { height: 100%; border-radius: 10px; transition: width 0.6s ease, background 0.4s; }
.detail-val { font-size: 0.75rem; color: var(--text); min-width: 28px; text-align: right; }

.stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
.stat-box {
  background: var(--panel); border-radius: 16px;
  border: 1px solid var(--border); padding: 14px 10px; text-align: center;
}
.stat-icon { font-size: 1.1rem; }
.stat-num { font-size: 1.5rem; font-weight: 900; margin: 2px 0 1px; color: var(--text); }
.stat-lbl { font-size: 0.7rem; color: var(--muted); }

.alert-popup {
  position: fixed; bottom: -200px; left: 50%; transform: translateX(-50%);
  width: min(380px, 90vw);
  background: var(--panel); border-radius: 24px;
  border: 2px solid var(--bad); padding: 20px 24px; text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 40px rgba(248,113,113,0.2);
  z-index: 100; transition: bottom 0.5s cubic-bezier(0.34,1.56,0.64,1);
}
.alert-popup.show { bottom: 30px; }
.alert-popup-emoji { font-size: 3rem; }
.alert-popup-title { font-size: 1.3rem; font-weight: 900; margin: 8px 0 4px; color: var(--bad); }
.alert-popup-reason { font-size: 0.85rem; color: var(--muted); margin-bottom: 12px; }
.alert-popup-msg { font-size: 1rem; font-weight: 700; color: var(--text); }

.settings-panel {
  background: var(--panel); border-radius: 20px;
  border: 1px solid var(--border); padding: 16px; margin-bottom: 16px;
}
.settings-title { font-size: 0.75rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 14px; }
.setting-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
.setting-row:last-child { margin-bottom: 0; }
.setting-label { flex: 1; font-size: 0.85rem; color: var(--text); }
.setting-row input[type=range] { width: 100px; accent-color: var(--accent); }
.setting-val { font-weight: 700; font-size: 0.85rem; min-width: 38px; text-align: right; color: var(--accent); }
.interval-btns { display: flex; gap: 6px; }
.interval-btn {
  background: var(--panel2); border: 1px solid var(--border);
  border-radius: 8px; padding: 4px 10px; font-size: 0.75rem;
  color: var(--muted); cursor: pointer; font-family: inherit; transition: all 0.15s;
}
.interval-btn.active { background: rgba(167,139,250,0.15); border-color: var(--accent); color: var(--accent); font-weight: 700; }

.btn-start {
  display: block; width: 100%; padding: 15px; border: none;
  border-radius: 16px; font-family: inherit; font-size: 1rem;
  font-weight: 900; cursor: pointer; transition: all 0.2s;
  letter-spacing: 0.03em; margin-bottom: 16px;
}
.btn-start.start { background: linear-gradient(135deg, #4ade80, #22c55e); color: #052e16; box-shadow: 0 6px 24px rgba(74,222,128,0.3); }
.btn-start.stop  { background: linear-gradient(135deg, #f87171, #ef4444); color: white; box-shadow: 0 6px 24px rgba(248,113,113,0.3); }
.btn-start:hover { transform: translateY(-2px); filter: brightness(1.05); }
.btn-start:active { transform: translateY(0); }
.btn-start:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

.ai-thinking {
  display: none; position: absolute; top: 10px; right: 10px;
  background: rgba(167,139,250,0.2); border: 1px solid rgba(167,139,250,0.4);
  border-radius: 8px; padding: 4px 10px; font-size: 0.7rem; color: var(--accent);
  z-index: 8; align-items: center; gap: 5px;
}
.ai-thinking.show { display: flex; }
.ai-spin {
  width: 10px; height: 10px;
  border: 2px solid rgba(167,139,250,0.3); border-top-color: var(--accent);
  border-radius: 50%; animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.log-panel {
  background: var(--panel); border-radius: 20px;
  border: 1px solid var(--border); padding: 14px 16px;
  max-height: 180px; overflow-y: auto;
}
.log-title { font-size: 0.75rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }
.log-item { display: flex; gap: 8px; padding: 5px 0; border-bottom: 1px solid var(--border); font-size: 0.8rem; }
.log-item:last-child { border: none; }
.log-time { color: var(--muted); font-size: 0.72rem; white-space: nowrap; }
.log-text { flex: 1; color: var(--text); }
.log-item.is-alert .log-text { color: var(--bad); font-weight: 700; }
.log-item.is-good  .log-text { color: var(--good); }

.confetti-wrap { position: fixed; inset: 0; pointer-events: none; z-index: 999; overflow: hidden; }
.confetti-piece { position: absolute; border-radius: 2px; animation: fall linear forwards; }
@keyframes fall { 0% { transform: translateY(-20px) rotate(0deg); opacity: 1; } 100% { transform: translateY(105vh) rotate(720deg); opacity: 0; } }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">
      <div class="logo-icon">🔍</div>
      <div class="logo-text">しゅうちゅう<span>AIモニター</span></div>
    </div>
    <div class="header-badge">Claude Vision</div>
  </header>

  <div class="main-grid">
    <div class="camera-panel">
      <div class="camera-inner">
        <video id="videoEl" autoplay playsinline muted></video>
        <canvas id="snapCanvas" style="display:none"></canvas>
        <div class="scan-line" id="scanLine"></div>
        <div class="corner corner-tl"></div>
        <div class="corner corner-tr"></div>
        <div class="corner corner-bl"></div>
        <div class="corner corner-br"></div>
        <div class="cam-placeholder" id="placeholder">
          <div class="cam-placeholder-icon">📷</div>
          <p>カメラをスタートしてね</p>
        </div>
        <div class="ai-thinking" id="aiThinking">
          <div class="ai-spin"></div>AI判定中…
        </div>
        <div class="cam-status-badge" id="camBadge">
          <div class="status-dot" id="statusDot"></div>
          <div class="cam-status-text" id="camStatusText">待機中</div>
          <div class="cam-status-time" id="camStatusTime"></div>
        </div>
      </div>
    </div>

    <div class="score-panel">
      <div class="score-title">集中スコア</div>
      <div class="score-ring-wrap">
        <svg class="score-svg" viewBox="0 0 100 100">
          <circle class="score-track" cx="50" cy="50" r="45"/>
          <circle class="score-fill" id="scoreRing" cx="50" cy="50" r="45"/>
        </svg>
        <div class="score-center">
          <div class="score-num" id="scoreNum">--</div>
          <div class="score-lbl">/ 100</div>
        </div>
      </div>
      <div class="reason-tags" id="reasonTags">
        <span class="tag ok" style="opacity:0.4">AIが判定します</span>
      </div>
    </div>

    <div class="detail-panel">
      <div class="detail-title">詳細チェック</div>
      <div class="detail-rows">
        <div class="detail-row">
          <span class="detail-row-label">👀 視線</span>
          <div class="detail-bar-wrap"><div class="detail-bar" id="bar-gaze" style="width:0%;background:var(--muted)"></div></div>
          <span class="detail-val" id="val-gaze">--</span>
        </div>
        <div class="detail-row">
          <span class="detail-row-label">🪑 姿勢</span>
          <div class="detail-bar-wrap"><div class="detail-bar" id="bar-posture" style="width:0%;background:var(--muted)"></div></div>
          <span class="detail-val" id="val-posture">--</span>
        </div>
        <div class="detail-row">
          <span class="detail-row-label">😶 表情</span>
          <div class="detail-bar-wrap"><div class="detail-bar" id="bar-expression" style="width:0%;background:var(--muted)"></div></div>
          <span class="detail-val" id="val-expression">--</span>
        </div>
        <div class="detail-row">
          <span class="detail-row-label">🧠 集中</span>
          <div class="detail-bar-wrap"><div class="detail-bar" id="bar-focus" style="width:0%;background:var(--muted)"></div></div>
          <span class="detail-val" id="val-focus">--</span>
        </div>
      </div>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat-box">
      <div class="stat-icon">⏱️</div>
      <div class="stat-num" id="focusTime">0:00</div>
      <div class="stat-lbl">集中時間</div>
    </div>
    <div class="stat-box">
      <div class="stat-icon">🔔</div>
      <div class="stat-num" id="alertCount">0</div>
      <div class="stat-lbl">声がけ回数</div>
    </div>
    <div class="stat-box">
      <div class="stat-icon">📊</div>
      <div class="stat-num" id="focusRate">--</div>
      <div class="stat-lbl">集中率</div>
    </div>
  </div>

  <div class="settings-panel">
    <div class="settings-title">⚙ せってい</div>
    <div class="setting-row">
      <span class="setting-label">📸 AI判定の間隔</span>
      <div class="interval-btns">
        <button class="interval-btn" data-sec="5">5秒</button>
        <button class="interval-btn active" data-sec="10">10秒</button>
        <button class="interval-btn" data-sec="20">20秒</button>
      </div>
    </div>
    <div class="setting-row">
      <span class="setting-label">🔔 声がけまでの連続回数</span>
      <input type="range" id="alertThresh" min="1" max="5" value="2" step="1">
      <span class="setting-val" id="alertThreshVal">2回</span>
    </div>
    <div class="setting-row">
      <span class="setting-label">🔊 音量</span>
      <input type="range" id="volumeSlider" min="0" max="1" value="0.8" step="0.1">
      <span class="setting-val" id="volumeVal">80%</span>
    </div>
  </div>

  <button class="btn-start start" id="mainBtn">📷 カメラをスタート</button>

  <div class="log-panel">
    <div class="log-title">📋 きろく</div>
    <div id="logList"></div>
  </div>
</div>

<div class="alert-popup" id="alertPopup">
  <div class="alert-popup-emoji" id="popupEmoji">😮</div>
  <div class="alert-popup-title" id="popupTitle">集中しよう！</div>
  <div class="alert-popup-reason" id="popupReason"></div>
  <div class="alert-popup-msg" id="popupMsg">もうひとふんばりできるよ！</div>
</div>

<div class="confetti-wrap" id="confettiWrap"></div>

<script>
const S = {
  running: false, scanInterval: 10, alertThresh: 2, volume: 0.8,
  unfocusedStreak: 0, focusedStreak: 0, focusSeconds: 0, totalSeconds: 0,
  alertCount: 0, lastScore: null, timer: null, scanTimer: null, alertCooldown: false,
};

const ALERT_MESSAGES = [
  { emoji:'😊', title:'集中しよう！', msg:'勉強がんばれ！きみならできる！' },
  { emoji:'💪', title:'もうひとふんばり！', msg:'あとすこしで終わるよ！' },
  { emoji:'👀', title:'テキストを見てみよう！', msg:'目線を本に戻してね！' },
  { emoji:'🌟', title:'集中モード、オン！', msg:'深呼吸して集中しよう！' },
  { emoji:'🚀', title:'ファイト！', msg:'集中パワーを出して！' },
  { emoji:'📚', title:'本を見てね！', msg:'もうすこしがんばれ！' },
];

const videoEl = document.getElementById('videoEl');
const snapCanvas = document.getElementById('snapCanvas');
const scanLine = document.getElementById('scanLine');
const placeholder = document.getElementById('placeholder');
const aiThinking = document.getElementById('aiThinking');
const camBadge = document.getElementById('camBadge');
const statusDot = document.getElementById('statusDot');
const camStatusText = document.getElementById('camStatusText');
const camStatusTime = document.getElementById('camStatusTime');
const scoreRing = document.getElementById('scoreRing');
const scoreNum = document.getElementById('scoreNum');
const reasonTags = document.getElementById('reasonTags');
const alertPopup = document.getElementById('alertPopup');
const mainBtn = document.getElementById('mainBtn');
const logList = document.getElementById('logList');

document.querySelectorAll('.interval-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.interval-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    S.scanInterval = +btn.dataset.sec;
  });
});
document.getElementById('alertThresh').addEventListener('input', e => {
  S.alertThresh = +e.target.value;
  document.getElementById('alertThreshVal').textContent = e.target.value + '回';
});
document.getElementById('volumeSlider').addEventListener('input', e => {
  S.volume = +e.target.value;
  document.getElementById('volumeVal').textContent = Math.round(S.volume*100) + '%';
});

async function analyzeFrame(b64) {
  const prompt = `あなたは子供の集中力を判定するAIです。
この画像は勉強中の子供をカメラで撮影したものです。

以下を1〜100のスコアで評価（100が最高）：
- gaze（視線）: 手元・テキスト方向を向いているか。天井・横を向く場合は低く。
- posture（姿勢）: 背筋が伸びているか。背もたれにもたれる・頬杖・うつむきすぎは低く。
- expression（表情）: 集中した顔つきか。ぼんやり・あくび・眠そう・うつろな目は低く。
- focus（総合集中度）: 全体的に集中しているか。

集中が切れているサインをreasonsに日本語で簡潔に（例: "上を向いている", "頬杖をついている", "目がうつろ"）
集中できているサインをpositive_reasonsに（例: "テキストを見ている", "姿勢がよい"）

JSONのみ返答（マークダウン不要）：
{"gaze":数値,"posture":数値,"expression":数値,"focus":数値,"overall":数値,"reasons":["..."],"positive_reasons":["..."],"summary":"一言説明"}`;

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 400,
      messages: [{ role: 'user', content: [
        { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: b64 } },
        { type: 'text', text: prompt }
      ]}]
    })
  });
  const data = await res.json();
  const text = (data.content||[]).map(c=>c.text||'').join('');
  return JSON.parse(text.replace(/```json|```/g,'').trim());
}

function captureFrame() {
  const w = videoEl.videoWidth||640, h = videoEl.videoHeight||480;
  snapCanvas.width = w; snapCanvas.height = h;
  const ctx = snapCanvas.getContext('2d');
  ctx.save(); ctx.scale(-1,1); ctx.drawImage(videoEl,-w,0,w,h); ctx.restore();
  return snapCanvas.toDataURL('image/jpeg',0.7).split(',')[1];
}

function applyResult(r) {
  S.lastScore = r.overall;
  const circ = 2*Math.PI*45;
  scoreRing.style.strokeDashoffset = circ*(1-r.overall/100);
  scoreNum.textContent = r.overall;
  const col = r.overall>=70?'#4ade80':r.overall>=45?'#fbbf24':'#f87171';
  scoreRing.style.stroke = col; scoreNum.style.color = col;

  [['gaze',r.gaze],['posture',r.posture],['expression',r.expression],['focus',r.focus]].forEach(([k,v])=>{
    document.getElementById('bar-'+k).style.width = v+'%';
    document.getElementById('bar-'+k).style.background = v>=70?'var(--good)':v>=45?'var(--warn)':'var(--bad)';
    document.getElementById('val-'+k).textContent = v;
  });

  reasonTags.innerHTML='';
  (r.reasons||[]).forEach(t=>{ const s=document.createElement('span'); s.className='tag bad'; s.textContent=t; reasonTags.appendChild(s); });
  (r.positive_reasons||[]).slice(0,2).forEach(t=>{ const s=document.createElement('span'); s.className='tag ok'; s.textContent=t; reasonTags.appendChild(s); });

  const focused = r.overall>=65, barely = r.overall>=45;
  camBadge.className='cam-status-badge '+(focused?'ok':barely?'warn':'bad');
  statusDot.className='status-dot '+(focused?'ok':barely?'warn':'bad');
  camStatusText.textContent = r.summary||(focused?'集中しているよ！':'ちょっと集中が切れてるかも');

  if(focused){ S.unfocusedStreak=0; S.focusedStreak++; if(S.focusedStreak===6)celebrate(); }
  else { S.unfocusedStreak++; S.focusedStreak=0; if(S.unfocusedStreak>=S.alertThresh&&!S.alertCooldown)triggerAlert(r); }

  addLog((focused?'😊 ':'⚠️ ')+r.summary+` (${r.overall}点)`, !focused, focused);
}

async function doScan() {
  if(!S.running) return;
  aiThinking.classList.add('show'); scanLine.classList.add('active');
  camStatusTime.textContent='判定中…';
  try { const img=captureFrame(); const r=await analyzeFrame(img); applyResult(r); }
  catch(e){ console.error(e); addLog('❌ AI判定エラー: '+e.message); }
  finally {
    aiThinking.classList.remove('show'); scanLine.classList.remove('active');
    const n=new Date(); camStatusTime.textContent=n.getHours()+':'+String(n.getMinutes()).padStart(2,'0');
  }
}

function triggerAlert(r) {
  S.alertCooldown=true; S.alertCount++;
  document.getElementById('alertCount').textContent=S.alertCount;
  const msg=ALERT_MESSAGES[S.alertCount%ALERT_MESSAGES.length];
  document.getElementById('popupEmoji').textContent=msg.emoji;
  document.getElementById('popupTitle').textContent=msg.title;
  document.getElementById('popupReason').textContent=(r.reasons||[]).join('・')||'';
  document.getElementById('popupMsg').textContent=msg.msg;
  alertPopup.classList.add('show');
  speak(msg.title+'。'+msg.msg);
  addLog(msg.emoji+' '+msg.title+' — '+msg.msg, true, false);
  setTimeout(()=>{ alertPopup.classList.remove('show'); S.unfocusedStreak=0; setTimeout(()=>{S.alertCooldown=false;}, S.scanInterval*1000*2); }, 4000);
}

function speak(text) {
  if(!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='ja-JP'; u.rate=0.92; u.pitch=1.15; u.volume=S.volume;
  const v=speechSynthesis.getVoices().find(v=>v.lang.startsWith('ja'));
  if(v) u.voice=v;
  speechSynthesis.speak(u);
}

function startTimer() {
  if(S.timer) clearInterval(S.timer);
  S.timer=setInterval(()=>{
    if(!S.running) return;
    S.totalSeconds++;
    if(S.lastScore!==null&&S.lastScore>=65) S.focusSeconds++;
    const m=Math.floor(S.focusSeconds/60), s=S.focusSeconds%60;
    document.getElementById('focusTime').textContent=m+':'+String(s).padStart(2,'0');
    if(S.totalSeconds>0) document.getElementById('focusRate').textContent=Math.round(S.focusSeconds/S.totalSeconds*100)+'%';
  },1000);
}

async function startMonitor() {
  mainBtn.disabled=true; mainBtn.textContent='起動中…';
  try {
    const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:640,height:480}});
    videoEl.srcObject=stream; await videoEl.play(); placeholder.style.display='none';
  } catch(e){ addLog('❌ カメラエラー: '+e.message); mainBtn.disabled=false; mainBtn.textContent='📷 カメラをスタート'; mainBtn.className='btn-start start'; return; }

  S.running=true; S.focusSeconds=0; S.totalSeconds=0; S.alertCount=0;
  S.unfocusedStreak=0; S.focusedStreak=0; S.lastScore=null; S.alertCooldown=false;
  document.getElementById('focusTime').textContent='0:00';
  document.getElementById('alertCount').textContent='0';
  document.getElementById('focusRate').textContent='--';
  logList.innerHTML='';
  mainBtn.disabled=false; mainBtn.className='btn-start stop'; mainBtn.textContent='⏹ ストップ';
  addLog('📷 モニタリング開始',false,true);
  startTimer();
  setTimeout(async()=>{ await doScan(); S.scanTimer=setInterval(doScan, S.scanInterval*1000); }, 2000);
}

function stopMonitor() {
  S.running=false;
  if(S.timer) clearInterval(S.timer);
  if(S.scanTimer) clearInterval(S.scanTimer);
  if(videoEl.srcObject){ videoEl.srcObject.getTracks().forEach(t=>t.stop()); videoEl.srcObject=null; }
  placeholder.style.display='flex';
  aiThinking.classList.remove('show'); scanLine.classList.remove('active');
  alertPopup.classList.remove('show');
  statusDot.className='status-dot'; camStatusText.textContent='待機中'; camStatusTime.textContent='';
  mainBtn.className='btn-start start'; mainBtn.textContent='📷 カメラをスタート';
  addLog('⏹ 終了（集中時間: '+document.getElementById('focusTime').textContent+'）');
  speechSynthesis&&speechSynthesis.cancel();
}

mainBtn.addEventListener('click',()=>{ if(S.running) stopMonitor(); else startMonitor(); });

function celebrate() {
  const wrap=document.getElementById('confettiWrap');
  const colors=['#f87171','#fbbf24','#4ade80','#60a5fa','#a78bfa','#fb7185'];
  for(let i=0;i<80;i++){
    const el=document.createElement('div'); el.className='confetti-piece';
    const sz=6+Math.random()*10;
    el.style.cssText=`left:${Math.random()*100}%;top:-15px;background:${colors[~~(Math.random()*colors.length)]};width:${sz}px;height:${sz}px;animation-duration:${1.5+Math.random()*2.5}s;animation-delay:${Math.random()*0.6}s;`;
    wrap.appendChild(el); setTimeout(()=>el.remove(),5000);
  }
  speak('すごい！よく集中できてるね！このちょうし！');
  addLog('🎉 集中継続中！すごい！',false,true);
}

function addLog(text,isAlert=false,isGood=false){
  const n=new Date();
  const t=n.getHours()+':'+String(n.getMinutes()).padStart(2,'0')+':'+String(n.getSeconds()).padStart(2,'0');
  const div=document.createElement('div');
  div.className='log-item'+(isAlert?' is-alert':isGood?' is-good':'');
  div.innerHTML=`<span class="log-time">${t}</span><span class="log-text">${text}</span>`;
  logList.prepend(div);
  if(logList.children.length>40) logList.removeChild(logList.lastChild);
}

window.addEventListener('load',()=>{
  if(window.speechSynthesis){ speechSynthesis.getVoices(); speechSynthesis.addEventListener('voiceschanged',()=>speechSynthesis.getVoices()); }
});
</script>
